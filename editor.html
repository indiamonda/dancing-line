<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Line – Path Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.168.0/build/three.module.js" } }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poiret One', sans-serif;
      background: #111;
      color: #eee;
      overflow: auto;
      height: 120%;
    }

    /* Setup screen */
    #setup {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: top;
      gap: 1.4rem;
      background: #111;
    }
    #setup.hidden { display: none; }
    #setup h1 {
      font-size: 1.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 30px;
      margin-bottom: 1.2rem;
    }
    .setup-title { font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; margin-bottom: 0.2rem; }
    .setup-row {
      display: flex; align-items: center; gap: 1rem;
    }
    .setup-row label {
      width: 140px;
      text-align: right;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .setup-row input[type="color"] {
      width: 50px; height: 36px;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    }
    .setup-row input[type="number"],
    .setup-row select {
      padding: 0.4rem 0.7rem;
      font-family: inherit;
      font-size: 0.9rem;
      color: #eee;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
    }
    .setup-row select { width: 220px; }
    .setup-row input[type="number"] { width: 80px; }

    .btn {
      padding: 0.7rem 2.2rem;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #eee;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.2); }
    .btn:active { background: rgba(255,255,255,0.3); }

    #mode-buttons { display: flex; gap: 1.5rem; margin: 0.5rem 0 1.5rem; }
    #mode-buttons .btn { font-size: 1.1rem; padding: 0.9rem 3rem; }

    #editor { position: absolute; inset: 0; display: none; }
    #editor.active { display: block; }

    canvas { display: block; width: 100%; height: 100%; }

    #hud {
      position: absolute;
      top: 1rem; left: 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.8;
      line-height: 1.8;
    }

    #controls-hint {
      position: absolute;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.45;
      pointer-events: none;
      white-space: nowrap;
    }

    #finish-btn {
      position: absolute;
      top: 1rem; right: 1.5rem;
      z-index: 5;
    }

    #output {
      position: absolute; inset: 0; z-index: 20;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem;
      background: #111;
      padding: 2rem;
    }
    #output.active { display: flex; }
    #output h2 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #output textarea {
      width: min(90vw, 700px);
      height: 50vh;
      font-family: monospace;
      font-size: 0.8rem;
      background: #1a1a1a;
      color: #aaffcc;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      resize: vertical;
    }
    .btn-row { display: flex; gap: 1rem; }

    /* Edit mode JSON paste modal */
    #edit-paste-modal {
      position: absolute; inset: 0; z-index: 30;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem;
      background: #111;
      padding: 2rem;
    }
    #edit-paste-modal.active { display: flex; }
    #edit-paste-modal h2 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #edit-paste-modal textarea {
      width: min(90vw, 700px);
      height: 50vh;
      font-family: monospace;
      font-size: 0.8rem;
      background: #1a1a1a;
      color: #aaffcc;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      resize: vertical;
    }
    #edit-paste-modal .btn-row { display: flex; gap: 1rem; }
    #edit-paste-error { color: #ff6666; font-size: 0.85rem; letter-spacing: 0.1em; min-height: 1.2em; }

    /* Auto-play toggle button */
    #autoplay-toggle {
      position: absolute;
      top: 1rem; right: 140px;
      z-index: 5;
      padding: 0.5rem 1.2rem;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #autoplay-toggle:hover { background: rgba(255,255,255,0.1); color: #eee; }
    #autoplay-toggle.active { color: #52c5a0; border-color: rgba(82,197,160,0.4); background: rgba(82,197,160,0.1); }
  </style>
</head>
<body>

<div id="setup">
  <h1>Path Editor</h1>
  <div id="mode-buttons">
    <button class="btn" id="btn-new-level">New Level</button>
    <button class="btn" id="btn-edit">Edit</button>
  </div>

  <div id="setup-form" style="display:none">
  <p class="setup-title">Theme</p>
  <div class="setup-row">
    <label>Background</label>
    <input type="color" id="col-bg" value="#0a1f23">
  </div>
  <div class="setup-row">
    <label>Path</label>
    <input type="color" id="col-path" value="#52c5a0">
  </div>
  <div class="setup-row">
    <label>Line</label>
    <input type="color" id="col-line" value="#f4fff8">
  </div>
  <div class="setup-row">
    <label>Start Length</label>
    <input type="number" id="start-length" value="8" min="1" max="50">
  </div>
  <div class="setup-row">
    <label>Start Width</label>
    <input type="number" id="start-width" value="1" min="0" max="9">
  </div>
  <div class="setup-row">
    <label>Speed</label>
    <input type="number" id="player-speed" value="5" min="1" max="20" step="0.5">
  </div>
  <div class="setup-row">
    <label>Speed Mult</label>
    <input type="number" id="speed-mult" value="1" min="0.1" max="5" step="0.05">
  </div>
  <div class="setup-row">
    <label>Audio Delay</label>
    <input type="number" id="audio-delay" value="0" step="0.05" min="-2" max="2">
  </div>
  <div class="setup-row">
    <label>Enable Glow</label>
    <input type="checkbox" id="enable-glow">
  </div>
  <h3 style="margin:0.8rem 0 0.3rem;font-size:0.85rem;opacity:0.7">Effects</h3>
  <div class="setup-row">
    <label>Fog</label>
    <input type="checkbox" id="fx-fog-on">
  </div>
  <div class="setup-row" id="fx-fog-opts" style="display:none">
    <label>Fog Color</label>
    <input type="color" id="fx-fog-color" value="#000000">
  </div>
  <div class="setup-row" id="fx-fog-near-row" style="display:none">
    <label>Fog Near</label>
    <input type="number" id="fx-fog-near" value="5" min="1" max="50" step="1">
  </div>
  <div class="setup-row" id="fx-fog-far-row" style="display:none">
    <label>Fog Far</label>
    <input type="number" id="fx-fog-far" value="35" min="5" max="200" step="1">
  </div>
  <div class="setup-row">
    <label>Particles</label>
    <select id="fx-particles">
      <option value="">None</option>
      <option value="snow">Snow</option>
      <option value="rain">Rain</option>
      <option value="dust">Dust</option>
    </select>
  </div>
  <div class="setup-row" id="fx-particles-count-row" style="display:none">
    <label>Count</label>
    <input type="number" id="fx-particles-count" value="150" min="10" max="1000" step="10">
  </div>
  <div class="setup-row" id="fx-particles-heavy-row" style="display:none">
    <label>Heavy</label>
    <input type="checkbox" id="fx-particles-heavy">
  </div>
  <div class="setup-row">
    <label>Path Animation</label>
    <select id="fx-path-anim">
      <option value="">None</option>
      <option value="fly-in">Fly In</option>
      <option value="ascend">Ascend</option>
      <option value="fade-color">Fade Color</option>
      <option value="chaos">Chaos</option>
      <option value="appear">Appear</option>
    </select>
  </div>
  <div class="setup-row" id="fx-pa-reveal-row" style="display:none">
    <label>Reveal Dist</label>
    <input type="number" id="fx-pa-reveal" value="2" min="0.5" max="10" step="0.1">
  </div>
  <div class="setup-row" id="fx-pa-speed-row" style="display:none">
    <label>Anim Speed</label>
    <input type="number" id="fx-pa-speed" value="2" min="0.1" max="10" step="0.1">
  </div>
  <div class="setup-row" id="fx-pa-sameheight-row" style="display:none">
    <label>Same Height</label>
    <input type="checkbox" id="fx-pa-sameheight">
  </div>
  <div class="setup-row" id="fx-pa-fadecolor-row" style="display:none">
    <label>Fade Color</label>
    <input type="color" id="fx-pa-fadecolor" value="#00ffff">
  </div>
  <div class="setup-row" id="fx-pa-fadedur-row" style="display:none">
    <label>Fade Duration</label>
    <input type="number" id="fx-pa-fadedur" value="0.6" min="0.1" max="3" step="0.1">
  </div>
  <div class="setup-row" id="fx-pa-lastearly-row" style="display:none">
    <label>Last Early Reveal</label>
    <input type="checkbox" id="fx-pa-lastearly">
  </div>
  <div class="setup-row">
    <label>Lighting</label>
    <select id="fx-lighting">
      <option value="">None</option>
      <option value="crystal">Crystal</option>
    </select>
  </div>
  <div class="setup-row">
    <label>Reflective Path</label>
    <input type="checkbox" id="fx-reflective">
  </div>
  <div class="setup-row">
    <label>Player Brightness</label>
    <input type="number" id="fx-brightness" value="0" min="0" max="1" step="0.05">
  </div>
  <div class="setup-row">
    <label>Music</label>
    <select id="music-select">
      <option value="">None</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/beginning.mp3">The Beginning</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/piano.mp3">The Piano</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/ocean.mp3">The Ocean</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/winter.mp3">The Winter</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/desert.mp3">The Desert</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/earth.mp3">The Earth</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/taurus.mp3">The Taurus</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/crystal.mp3">The Crystal</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/chaos.mp3">The Chaos</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/storm.mp3">The Storm</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/abs-storm.mp3">The Absolute Storm</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/dream-of-sky.mp3">Dream of Sky</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/west.mp3">The West</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/war.mp3">The War</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/storm-remix.mp3">The Storm Remix</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/spring-festival.mp3">The Spring Festival</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/samsara.mp3">The Samsara</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/legend-of-assassin.mp3">The Legend of Assassin</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/romance.mp3">The Romance</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/spring.mp3">The Spring</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/ugly-duckling.mp3">The Ugly Duckling</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/end.mp3">The End</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/heracles.mp3">The Heracles</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/judgement.mp3">The Judgement</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/birds-of-a-feather.mp3">The Birds of a Feather</option>
       <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/chinese-garden.mp3">The Chinese Garden</option>
      <option value="__upload__">Upload file...</option>
    </select>
    <input type="file" id="music-file" accept="audio/*" style="display:none">
  </div>
  <button class="btn" id="start-btn" style="margin-top:1rem">Start Drawing</button>
  </div>
</div>

<!-- Edit mode JSON paste modal -->
<div id="edit-paste-modal">
  <h2>Paste Level JSON</h2>
  <textarea id="edit-json-input" placeholder="Paste level JSON here..."></textarea>
  <div id="edit-paste-error"></div>
  <div class="btn-row">
    <button class="btn" id="edit-load-btn">Load</button>
    <button class="btn" id="edit-cancel-btn">Cancel</button>
  </div>
</div>

<div id="editor">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="width-display">Width: 1 (1.0x)</div>
    <div id="seg-count">Segments: 0</div>
  </div>
  <div id="controls-hint">Click / Space / J / K = Turn &nbsp;&bull;&nbsp; 1-9 = Path Width &nbsp;&bull;&nbsp; Esc = Finish</div>
  <button class="btn" id="finish-btn">Finish</button>
  <button class="btn" id="autoplay-toggle">Auto</button>
</div>

<div id="output">
  <h2>Level JSON</h2>
  <textarea id="json-out" readonly></textarea>
  <div class="btn-row">
    <button class="btn" id="copy-btn">Copy</button>
    <button class="btn" id="continue-btn">Continue</button>
    <button class="btn" id="restart-btn">New</button>
  </div>
</div>

<script type="module">
import * as THREE from "three";
import { mergeGeometries } from "https://unpkg.com/three@0.168.0/examples/jsm/utils/BufferGeometryUtils.js";

const setupEl = document.getElementById("setup");
const editorEl = document.getElementById("editor");
const outputEl = document.getElementById("output");
const canvasEl = document.getElementById("canvas");
const editPasteModal = document.getElementById("edit-paste-modal");
const editJsonInput = document.getElementById("edit-json-input");
const editPasteError = document.getElementById("edit-paste-error");

const colBg = document.getElementById("col-bg");
const colPath = document.getElementById("col-path");
const colLine = document.getElementById("col-line");
const startLengthEl = document.getElementById("start-length");
const startWidthEl = document.getElementById("start-width");
const playerSpeedEl = document.getElementById("player-speed");
const speedMultEl = document.getElementById("speed-mult");
const audioDelayEl = document.getElementById("audio-delay");
const enableGlowEl = document.getElementById("enable-glow");
const musicSelect = document.getElementById("music-select");
const musicFileEl = document.getElementById("music-file");
const startBtn = document.getElementById("start-btn");
const finishBtn = document.getElementById("finish-btn");
const widthDisplay = document.getElementById("width-display");
const segCountEl = document.getElementById("seg-count");
const jsonOut = document.getElementById("json-out");
const copyBtn = document.getElementById("copy-btn");
const continueBtn = document.getElementById("continue-btn");
const restartBtn = document.getElementById("restart-btn");
const autoplayToggle = document.getElementById("autoplay-toggle");
const setupForm = document.getElementById("setup-form");

const btnNewLevel = document.getElementById("btn-new-level");
const btnEdit = document.getElementById("btn-edit");

const fxFogOn = document.getElementById("fx-fog-on");
const fxFogColor = document.getElementById("fx-fog-color");
const fxFogNear = document.getElementById("fx-fog-near");
const fxFogFar = document.getElementById("fx-fog-far");
const fxParticles = document.getElementById("fx-particles");
const fxParticlesCount = document.getElementById("fx-particles-count");
const fxParticlesHeavy = document.getElementById("fx-particles-heavy");
const fxPathAnim = document.getElementById("fx-path-anim");
const fxPaReveal = document.getElementById("fx-pa-reveal");
const fxPaSpeed = document.getElementById("fx-pa-speed");
const fxPaSameHeight = document.getElementById("fx-pa-sameheight");
const fxPaFadeColor = document.getElementById("fx-pa-fadecolor");
const fxPaFadeDur = document.getElementById("fx-pa-fadedur");
const fxPaLastEarly = document.getElementById("fx-pa-lastearly");
const fxLighting = document.getElementById("fx-lighting");
const fxReflective = document.getElementById("fx-reflective");
const fxBrightness = document.getElementById("fx-brightness");

fxFogOn.addEventListener("change", () => {
  const show = fxFogOn.checked ? "" : "none";
  document.getElementById("fx-fog-opts").style.display = show;
  document.getElementById("fx-fog-near-row").style.display = show;
  document.getElementById("fx-fog-far-row").style.display = show;
});
fxParticles.addEventListener("change", () => {
  const on = fxParticles.value !== "";
  document.getElementById("fx-particles-count-row").style.display = on ? "" : "none";
  document.getElementById("fx-particles-heavy-row").style.display = fxParticles.value === "rain" ? "" : "none";
});
fxPathAnim.addEventListener("change", () => {
  const v = fxPathAnim.value;
  const on = v !== "";
  document.getElementById("fx-pa-reveal-row").style.display = on ? "" : "none";
  document.getElementById("fx-pa-speed-row").style.display = (v === "fly-in" || v === "ascend" || v === "chaos") ? "" : "none";
  document.getElementById("fx-pa-sameheight-row").style.display = v === "fly-in" ? "" : "none";
  document.getElementById("fx-pa-fadecolor-row").style.display = v === "fade-color" ? "" : "none";
  document.getElementById("fx-pa-fadedur-row").style.display = v === "fade-color" ? "" : "none";
  document.getElementById("fx-pa-lastearly-row").style.display = v === "chaos" ? "" : "none";
});

// Width: 1=1x, 9=5x exponential
function widthScale(w) { return w <= 0 ? 0.5 : Math.pow(5, (w - 1) / 8); }

const STORAGE_KEY = "dl-editor-settings";
function saveSettings() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      bg: colBg.value, path: colPath.value, line: colLine.value,
      startLength: startLengthEl.value, startWidth: startWidthEl.value,
      speed: playerSpeedEl.value, speedMult: speedMultEl.value, audioDelay: audioDelayEl.value, glow: enableGlowEl.checked,
      music: musicSelect.value === "__upload__" ? "" : musicSelect.value,
      fx: {
        fogOn: fxFogOn.checked, fogColor: fxFogColor.value,
        fogNear: fxFogNear.value, fogFar: fxFogFar.value,
        particles: fxParticles.value, particlesCount: fxParticlesCount.value,
        particlesHeavy: fxParticlesHeavy.checked,
        pathAnim: fxPathAnim.value, paReveal: fxPaReveal.value,
        paSpeed: fxPaSpeed.value, paSameHeight: fxPaSameHeight.checked,
        paFadeColor: fxPaFadeColor.value, paFadeDur: fxPaFadeDur.value,
        paLastEarly: fxPaLastEarly.checked,
        lighting: fxLighting.value, reflective: fxReflective.checked,
        brightness: fxBrightness.value
      }
    }));
  } catch (_) {}
}
function loadSettings() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!d) return;
    if (d.bg) colBg.value = d.bg;
    if (d.path) colPath.value = d.path;
    if (d.line) colLine.value = d.line;
    if (d.startLength) startLengthEl.value = d.startLength;
    if (d.startWidth) startWidthEl.value = d.startWidth;
    if (d.speed) playerSpeedEl.value = d.speed;
    if (d.speedMult) speedMultEl.value = d.speedMult;
    if (d.audioDelay != null) audioDelayEl.value = d.audioDelay;
    if (d.glow != null) enableGlowEl.checked = d.glow;
    if (d.music) musicSelect.value = d.music;
    if (d.fx) {
      const f = d.fx;
      if (f.fogOn != null) fxFogOn.checked = f.fogOn;
      if (f.fogColor) fxFogColor.value = f.fogColor;
      if (f.fogNear) fxFogNear.value = f.fogNear;
      if (f.fogFar) fxFogFar.value = f.fogFar;
      if (f.particles) fxParticles.value = f.particles;
      if (f.particlesCount) fxParticlesCount.value = f.particlesCount;
      if (f.particlesHeavy != null) fxParticlesHeavy.checked = f.particlesHeavy;
      if (f.pathAnim) fxPathAnim.value = f.pathAnim;
      if (f.paReveal) fxPaReveal.value = f.paReveal;
      if (f.paSpeed) fxPaSpeed.value = f.paSpeed;
      if (f.paSameHeight != null) fxPaSameHeight.checked = f.paSameHeight;
      if (f.paFadeColor) fxPaFadeColor.value = f.paFadeColor;

function clearParticles() {
  [snowParticles, rainParticles, dustParticles].forEach(arr => {
    if (arr) {
      arr.forEach(p => { scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); });
    }
  });
  snowParticles = null;
  rainParticles = null;
  dustParticles = null;
}

function createParticles(type, count, heavy) {
  clearParticles();
  const px = playerMesh ? playerMesh.position.x : 0;
  const pz = playerMesh ? playerMesh.position.z : 0;
  const spawnAround = (py) => {
    py = py || 10;
    return { x: px + (Math.random() - 0.5) * 30, y: py + Math.random() * 15, z: pz + (Math.random() - 0.5) * 30 };
  };
  if (type === "snow") {
    const snowMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
    snowParticles = [];
    for (let i = 0; i < count; i++) {
      const r = 0.05 + Math.random() * 0.1;
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 4, 4), snowMat.clone());
      mesh.visible = true;
      scene.add(mesh);
      const pos = spawnAround();
      mesh.position.set(pos.x, pos.y, pos.z);
      snowParticles.push({ mesh, vx: (Math.random() - 0.5) * 2, vy: -(1 + Math.random() * 2), vz: (Math.random() - 0.5) * 2 });
    }
  } else if (type === "rain") {
    const rainMat = new THREE.MeshBasicMaterial({ color: 0xaaccdd, transparent: true, opacity: heavy ? 0.7 : 0.5 });
    rainParticles = [];
    for (let i = 0; i < count; i++) {
      const len = heavy ? 0.3 + Math.random() * 0.5 : 0.15 + Math.random() * 0.3;
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, len, 4), rainMat.clone());
      mesh.visible = true;
      scene.add(mesh);
      const pos = spawnAround();
      mesh.position.set(pos.x, pos.y, pos.z);
      rainParticles.push({ mesh, vy: heavy ? -(20 + Math.random() * 15) : -(10 + Math.random() * 8) });
    }
  } else if (type === "dust") {
    const dustColor = 0xbebebe;
    dustParticles = [];
    for (let i = 0; i < count; i++) {
      const size = 0.04 + Math.random() * 0.08;
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), new THREE.MeshBasicMaterial({ color: dustColor, transparent: true, opacity: 0.4 + Math.random() * 0.3 }));
      mesh.visible = true;
      scene.add(mesh);
      const pos = spawnAround(5);
      mesh.position.set(pos.x, pos.y, pos.z);
      dustParticles.push({ mesh, vx: -(2 + Math.random() * 2), vy: 0, vz: (Math.random() - 0.5) * 0.5 });
    }
  }
}

function updateParticles(dt) {
  const px = playerMesh ? playerMesh.position.x : 0;
  const pz = playerMesh ? playerMesh.position.z : 0;
  if (snowParticles) {
    snowParticles.forEach(p => {
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.position.z += p.vz * dt;
      if (p.mesh.position.y < -1) {
        p.mesh.position.set(px + (Math.random() - 0.5) * 30, 10 + Math.random() * 15, pz + (Math.random() - 0.5) * 30);
        p.vx = (Math.random() - 0.5) * 2;
        p.vy = -(1 + Math.random() * 2);
        p.vz = (Math.random() - 0.5) * 2;
      }
    });
  }
  if (rainParticles) {
    rainParticles.forEach(p => {
      p.mesh.position.y += p.vy * dt;
      if (p.mesh.position.y < -1) {
        p.mesh.position.set(px + (Math.random() - 0.5) * 30, 10 + Math.random() * 15, pz + (Math.random() - 0.5) * 30);
      }
    });
  }
  if (dustParticles) {
    dustParticles.forEach(p => {
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.position.z += p.vz * dt;
      if (p.mesh.position.x < px - 20 || p.mesh.position.x > px + 20 || p.mesh.position.z < pz - 20 || p.mesh.position.z > pz + 20) {
        p.mesh.position.set(px + (Math.random() - 0.5) * 30, 5 + Math.random() * 5, pz + (Math.random() - 0.5) * 30);
        p.vx = -(2 + Math.random() * 2);
        p.vz = (Math.random() - 0.5) * 0.5;
      }
    });
  }
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.round(r * (1 - amount));
  g = Math.round(g * (1 - amount));
  b = Math.round(b * (1 - amount));
  return "#" + [r, g, b].map(c => c.toString(16).padStart(2, "0")).join("");
}

function initScene(bgColor, pathColor, lineColor, glowIntensity) {
  renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
  renderer.setPixelRatio(1);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = false;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(bgColor);
  scene.fog = new THREE.Fog(bgColor, fxFogOn.checked ? parseFloat(fxFogNear.value) : 30, fxFogOn.checked ? parseFloat(fxFogFar.value) : 120);

  const hemi = new THREE.HemisphereLight(bgColor, darken(bgColor, 0.5), 0.6);
  scene.add(hemi);
  const amb = new THREE.AmbientLight(new THREE.Color(bgColor), 0.4);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(15, 25, 10);
  scene.add(dir);

  const groundMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(bgColor), roughness: 0.95 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.25;
  ground.receiveShadow = true;
  scene.add(ground);

  camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 250);
  camera.position.set(-10, 8, -10);
  camera.lookAt(0, 0, 0);

  pathGroup = new THREE.Group();
  scene.add(pathGroup);
  trailGroup = new THREE.Group();
  scene.add(trailGroup);

  const playerGeom = new THREE.BoxGeometry(0.28, 0.28, 0.28);
  const playerMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(lineColor),
    emissive: new THREE.Color(lineColor),
    emissiveIntensity: glowIntensity,
    roughness: 0.45,
    metalness: 0.1,
  });
  playerMesh = new THREE.Mesh(playerGeom, playerMat);
  playerMesh.castShadow = true;
  playerMesh.position.set(0, 0.14, 0);
  scene.add(playerMesh);

  window.addEventListener("resize", onResize);
}

function onResize() {
  if (!renderer) return;
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}

function destroyScene() {
  window.removeEventListener("resize", onResize);
  clearParticles();
  if (renderer) {
    renderer.dispose();
    scene.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
    renderer = null;
    scene = null;
  }
}

let pathMaterial, livePathMaterial, trailMaterial, bgColor, pathColor, lineColor;

function buildPathGeom(axis, length, width, startX, startZ, isFirst) {
  const w = widthScale(width);
  const ext = isFirst ? 0 : w / 2;
  const totalLen = length + ext;
  const geom = new THREE.BoxGeometry(
    axis === "x" ? totalLen : w,
    0.12,
    axis === "z" ? totalLen : w
  );
  const cx = startX + (axis === "x" ? (length / 2 - ext / 2) : 0);
  const cz = startZ + (axis === "z" ? (length / 2 - ext / 2) : 0);
  geom.translate(cx, -0.06, cz);
  return geom;
}

let pathMesh = null;
function rebuildPath() {
  if (pathMesh) {
    pathGroup.remove(pathMesh);
    pathMesh.geometry.dispose();
    pathMesh = null;
  }
  if (segments.length === 0) return;
  const geoms = [];
  let dx = 0, dz = 0;
  segments.forEach((seg, i) => {
    geoms.push(buildPathGeom(seg.axis, seg.length, seg.width, dx, dz, i === 0));
    dx += seg.axis === "x" ? seg.length : 0;
    dz += seg.axis === "z" ? seg.length : 0;
  });
  const merged = mergeGeometries(geoms, false);
  geoms.forEach(g => g.dispose());
  pathMesh = new THREE.Mesh(merged, pathMaterial);
  pathMesh.receiveShadow = true;
  pathGroup.add(pathMesh);
}

// For edit mode: build full path from loaded segments
let editPathMesh = null;
function rebuildEditPath() {
  // Clear previous path meshes
  while (pathGroup.children.length) {
    const c = pathGroup.children[0];
    pathGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
  }
  editPathMesh = null;
  if (editSegments.length === 0) return;
  const geoms = [];
  let dx = 0, dz = 0;
  editSegments.forEach((seg, i) => {
    const w = seg.width != null ? seg.width : 1;
    geoms.push(buildPathGeom(seg.axis, seg.length, w, dx, dz, i === 0));
    dx += seg.axis === "x" ? seg.length : 0;
    dz += seg.axis === "z" ? seg.length : 0;
  });
  const merged = mergeGeometries(geoms, false);
  geoms.forEach(g => g.dispose());
  editPathMesh = new THREE.Mesh(merged, pathMaterial);
  editPathMesh.receiveShadow = true;
  pathGroup.add(editPathMesh);
}

const TRAIL_W = 0.32; // must match runtime.js trailWidth default
const TRAIL_H = 0.35;
function addTrailSegment(fromX, fromZ, toX, toZ, isFirst, height) {
  const dx = toX - fromX;
  const dz = toZ - fromZ;
  const len = Math.hypot(dx, dz);
  if (len < 0.01) return;
  const w = widthScale(currentWidth);
  const ext = isFirst ? 0 : w / 2;
  const totalLen = len + ext;
  const geom = new THREE.BoxGeometry(
    Math.abs(dx) > Math.abs(dz) ? totalLen : w,
    TRAIL_H,
    Math.abs(dz) >= Math.abs(dx) ? totalLen : w
  );
  const mesh = new THREE.Mesh(geom, trailMaterial);
  mesh.castShadow = true;
  const cx = (fromX + toX) / 2 - (Math.sign(dx) * ext / 2);
  const cz = (fromZ + toZ) / 2 - (Math.sign(dz) * ext / 2);
  // Use height (playerY) if provided, otherwise default to ground level
  const trailY = (height !== undefined ? height : 0) + TRAIL_H / 2 + 0.01;
  mesh.position.set(cx, trailY, cz);
  trailGroup.add(mesh);
}

function startNewLevel() {
  editorMode = "new";

  bgColor = colBg.value;
  pathColor = colPath.value;
  lineColor = colLine.value;
  const startLength = Math.max(1, parseInt(startLengthEl.value) || 8);
  speed = Math.max(0.5, Math.min(20, parseFloat(playerSpeedEl.value) || 5));
  speedMult = Math.max(0.1, parseFloat(speedMultEl.value) || 1);

  if (musicSelect.value === "__upload__" && uploadedMusicBlob) {
    musicUrl = uploadedMusicBlob;
  } else if (musicSelect.value && musicSelect.value !== "__upload__") {
    musicUrl = musicSelect.value;
  } else {
    musicUrl = "";
  }

  setupEl.classList.add("hidden");
  editorEl.classList.add("active");

  // In new mode, all letter keys trigger turns
  window.controlsHint = "new";

  segments = [];
  currentWidth = Math.max(0, Math.min(9, parseInt(startWidthEl.value) || 0));
  direction = "x";
  pos = { x: 0, z: 0 };
  currentSegLength = 0;
  widthDisplay.textContent = "Width: " + currentWidth + " (" + widthScale(currentWidth).toFixed(1) + "x)";

  initScene(bgColor, pathColor, lineColor, enableGlowEl.checked ? 1.2 : 0.55);

  const glowIntensity = enableGlowEl.checked ? 1.2 : 0.55;
  pathMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(pathColor),
    roughness: 0.8,
    transparent: true,
    opacity: 0.55,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1,
  });
  livePathMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(pathColor),
    roughness: 0.8,
    transparent: true,
    opacity: 0.55,
    depthWrite: false,
  });
  trailMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(lineColor),
    emissive: new THREE.Color(lineColor),
    emissiveIntensity: glowIntensity,
    roughness: 0.45,
    metalness: 0.1,
  });

  segments.push({ axis: "x", length: startLength, width: currentWidth });
  pos.x = startLength;
  rebuildPath();
  segCountEl.textContent = "Segments: 1";

  trailLastX = 0;
  trailLastZ = 0;
  addTrailSegment(0, 0, pos.x, pos.z, true);
  trailLastX = pos.x;
  trailLastZ = pos.z;

  playerMesh.position.set(pos.x, 0.14, pos.z);
  camPos = new THREE.Vector3(pos.x - 10, 8, pos.z - 10);
  camLook = new THREE.Vector3(pos.x, 0, pos.z);
  camera.position.copy(camPos);
  camera.lookAt(camLook);

  updateControlsHintNew();

  if (musicAudio) { musicAudio.pause(); musicAudio = null; }
  if (musicUrl) {
    musicAudio = new Audio(musicUrl);
    musicAudio.playbackRate = 1;
    musicAudio.play().catch(() => {});
  }

  // Reset drop/camera
  dropState = "none";
  camRotating = false;
  camRotActive = false;
  editAutoPlaying = false;
  autoplayToggle.classList.remove("active");

  // Reset recording state
  cameraRotations = [];
  drops = [];
  pendingDrop = null;
  pendingCamRot = null;

  initLiveMeshes();

  // Particles
  if (fxParticles.value) {
    createParticles(fxParticles.value, parseInt(fxParticlesCount.value) || 150, fxParticlesHeavy.checked);
  }

  running = true;
  canvasEl.addEventListener("pointerdown", onTap);
  window.addEventListener("keydown", onKey);
  window.addEventListener("keyup", onKeyUp);
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function startEditMode() {
  editorMode = "edit";
  setupEl.classList.add("hidden");
  editPasteModal.classList.remove("active");
  // Use settings from level or defaults
  bgColor = editLevelData.theme?.sky || "#0a1f23";
  pathColor = editLevelData.theme?.tileTop || "#52c5a0";
  lineColor = editLevelData.theme?.line || "#f4fff8";
  speed = editLevelData.tempo || 5;
  musicUrl = editLevelData.audio || "";

  editorEl.classList.add("active");

  currentWidth = 1;
  direction = editLevelData.start?.dir || "x";
  pos = { x: editLevelData.start?.x || 0, z: editLevelData.start?.z || 0 };
  currentSegLength = 0;
  widthDisplay.textContent = "Width: 1 (1.0x)";

  initScene(bgColor, pathColor, lineColor);

  pathMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(pathColor),
    roughness: 0.8,
    transparent: true,
    opacity: 0.55,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1,
  });
  trailMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(lineColor),
    emissive: new THREE.Color(lineColor),
    emissiveIntensity: enableGlowEl.checked ? 1.2 : 0.55,
    roughness: 0.45,
    metalness: 0.1,
  });
  livePathMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(pathColor),
    roughness: 0.8,
    transparent: true,
    opacity: 0.55,
    depthWrite: false,
  });

  // Clear any previous scene objects
  while (trailGroup.children.length) {
    const c = trailGroup.children[0];
    trailGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
  }
  while (pathGroup.children.length) {
    const c = pathGroup.children[0];
    pathGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
  }

  rebuildEditPath();

  trailLastX = pos.x;
  trailLastZ = pos.z;

  editSegIdx = 0;
  editSegProgress = 0;
  // Load drops from JSON so they trigger at corners during playback
  if (editLevelData && editLevelData.segments) {
    drops = editLevelData.segments
      .map((s, i) => s.drop ? { segIdx: i, type: s.drop.type, targetY: s.drop.targetY } : null)
      .filter(d => d !== null);
    // Load camera rotations from JSON
    cameraRotations = editLevelData.segments
      .map((s, i) => s.camRot ? { segIdx: i, startOffset: s.camRot.startOffset, duration: s.camRot.duration, direction: s.camRot.direction } : null)
      .filter(c => c !== null);
  }
  // Advance to start of first segment
  if (editSegments.length > 0) {
    const seg = editSegments[0];
    if (seg.axis === "x") pos.x += 0;
    else pos.z += 0;
  }

  playerMesh.position.set(pos.x, 0.14, pos.z);
  camPos = new THREE.Vector3(pos.x - 10, 8, pos.z - 10);
  camLook = new THREE.Vector3(pos.x, 0, pos.z);
  camera.position.copy(camPos);
  camera.lookAt(camLook);

  updateControlsHintEdit();

  if (musicAudio) { musicAudio.pause(); musicAudio = null; }
  if (musicUrl) {
    musicAudio = new Audio(musicUrl);
    musicAudio.playbackRate = 1;
    musicAudio.play().catch(() => {});
  }

  dropState = "none";
  camRotating = false;
  camRotActive = false;
  camRotTriggeredForIdx = -1;
  editAutoPlaying = false;
  autoplayToggle.classList.remove("active");

  initLiveMeshes();

  // Particles (from loaded level data)
  if (editLevelData.effects?.particles) {
    const pt = editLevelData.effects.particles;
    createParticles(pt.type, pt.count || 150, pt.heavy || false);
  } else if (fxParticles.value) {
    createParticles(fxParticles.value, parseInt(fxParticlesCount.value) || 150, fxParticlesHeavy.checked);
  }

  running = true;
  canvasEl.addEventListener("pointerdown", onTap);
  window.addEventListener("keydown", onKey);
  window.addEventListener("keyup", onKeyUp);
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function onKeyUp(e) {
  if (!running) return;
  if (e.code === "KeyE" && camRotActive) {
    if (camRotating && pendingCamRot) {
      pendingCamRot.duration = (performance.now() / 1000) - pendingCamRot.startTime;
      if (pendingCamRot.duration > 0.1) {
        cameraRotations.push(pendingCamRot);
      }
      pendingCamRot = null;
    }
    camRotating = false;
    camRotActive = false;
  }
}

function updateControlsHintNew() {
  document.getElementById("controls-hint").textContent = "Any key = Turn • 1-9 = Path Width • Esc = Finish";
}

function updateControlsHintEdit() {
  document.getElementById("controls-hint").textContent = "J / K / Space / Click = Turn • Q = Normal Drop • W = Float Drop • E (hold) = Camera Rotate • Auto = ON";
}

function onTap(e) {
  if (e.target && e.target.closest("button")) return;
  // Only trigger turn in NEW mode, not EDIT mode
  if (editorMode !== "new") return;
  turn();
}

function onKey(e) {
  if (!running) return;
  if (editorMode === "new") {
    // All letter keys + space trigger turn
    if (e.code === "Space" || (e.key.length === 1 && e.key.match(/[a-zA-Z]/))) {
      e.preventDefault();
      turn();
    } else if (e.key >= "0" && e.key <= "9") {
      currentWidth = parseInt(e.key);
      widthDisplay.textContent = "Width: " + currentWidth + " (" + widthScale(currentWidth).toFixed(1) + "x)";
    } else if (e.code === "KeyE") {
      e.preventDefault();
      // Start camera rotation recording (hold E to rotate)
      if (!camRotActive && !camRotating) {
        camRotActive = true;
        camRotating = true;
        camRotElapsed = 0;
        camRotAxis = e.shiftKey ? -1 : 1;
        camRotDuration = 9999; // will be set on release
        // Record which segment we're on when rotation starts
        const currentSegIdx = (editorMode === "edit") ? editSegIdx : segments.length;
        pendingCamRot = {
          segIdx: currentSegIdx,
          startOffset: editorMode === "edit" ? editSegProgress : currentSegLength,
          startTime: performance.now() / 1000,
          direction: camRotAxis,
          duration: 0
        };
        startCamRotate(camRotAxis);
      }
    } else if (e.code === "KeyQ") {
      e.preventDefault();
      // Normal drop: start or end drop
      if (dropState === "none") {
        // Start normal drop - first commit current segment
        if (currentSegLength > 0.1) {
          commitSegment();
        }
        // Record drop to the segment that just ended (if not already recorded)
        const segIdx = segments.length - 1;
        if (segIdx >= 0 && !drops.some(d => d.segIdx === segIdx)) {
          drops.push({ segIdx, type: "normal", targetY: dropTargetY });
        }
        // Start drop animation
        dropState = "normal";
        dropProgress = 0;
        dropStartY = playerY;
        dropAxis = direction;
        dropDirection = 1;
      } else if (dropState === "normal") {
        // End normal drop at current position
        // Calculate current Y based on drop progress
        const currentY = dropStartY + (dropTargetY - dropStartY) * dropProgress;
        playerY = currentY;
        dropTargetY = currentY;
        dropState = "none";
        dropProgress = 0;
        playerMesh.position.set(pos.x, playerY, pos.z);
        // Update the last drop entry's targetY
        if (drops.length > 0) {
          drops[drops.length - 1].targetY = currentY;
        }
      }
    } else if (e.code === "KeyW") {
      e.preventDefault();
      // Float drop: start or end drop
      if (dropState === "none") {
        // Start float drop - first commit current segment
        if (currentSegLength > 0.1) {
          commitSegment();
        }
        // Record drop to the segment that just ended (if not already recorded)
        const segIdx = segments.length - 1;
        if (segIdx >= 0 && !drops.some(d => d.segIdx === segIdx)) {
          drops.push({ segIdx, type: "float", targetY: dropTargetY });
        }
        // Start drop animation
        dropState = "float";
        dropProgress = 0;
        dropStartY = playerY;
        dropAxis = direction;
        dropDirection = 1;
      } else if (dropState === "float") {
        // End float drop at current position
        // Calculate current Y based on drop progress (same formula as updateDrop)
        let currentY;
        if (dropProgress < 0.4) {
          currentY = dropStartY + (dropStartY + 2.5 - dropStartY) * (dropProgress / 0.4);
        } else {
          const fallT = (dropProgress - 0.4) / 0.6;
          const peakY = dropStartY + 2.5;
          currentY = peakY + (dropTargetY - peakY) * fallT;
        }
        playerY = currentY;
        dropTargetY = currentY;
        dropState = "none";
        dropProgress = 0;
        playerMesh.position.set(pos.x, playerY, pos.z);
        // Update the last drop entry's targetY
        if (drops.length > 0) {
          drops[drops.length - 1].targetY = currentY;
        }
      }
    } else if (e.key === "Escape") finish();
  } else {
    // EDIT mode: J/K/Space = turn, Q = normal drop, W = float drop, E (hold) = camera rotate
    if (e.code === "KeyJ" || e.code === "KeyK" || e.code === "Space" || e.type === "touchstart") {
      e.preventDefault();
      turn();
    } else if (e.code === "KeyQ") {
      e.preventDefault();
      toggleNormalDrop();
    } else if (e.code === "KeyW") {
      e.preventDefault();
      toggleFloatDrop();
    } else if (e.code === "KeyE" && !camRotActive && !camRotating) {
      e.preventDefault();
      camRotActive = true;
      camRotating = true;
      camRotElapsed = 0;
      camRotAxis = e.shiftKey ? -1 : 1;
      camRotDuration = 9999;
      camRotStartTime = performance.now() / 1000;
      startCamRotate(camRotAxis);
    } else if (e.key === "Escape") {
      finish();
    }
  }
}

function onKeyUp(e) {
  if (!running) return;
  if (e.code === "KeyE" && camRotActive) {
    if (camRotating) {
      // In edit mode, calculate actual duration for the rotation
      if (editorMode === "edit" && camRotStartTime > 0) {
        const elapsed = (performance.now() / 1000) - camRotStartTime;
        if (elapsed > 0.1) {
          camRotDuration = elapsed;
          camRotSpeed = 360 / camRotDuration;
        }
      }
      camRotating = false;
    }
    camRotActive = false;
  }
  // Note: Q release handling removed - drops complete naturally via updateDrop
  // When Q is pressed again during an active drop, it ends the drop at current position
}

function turn() {
  if (!running) return;
  // Can't turn during drops
  if (dropState !== "none") return;

  if (editorMode === "new") {
    // Record pending drop to the segment that just ended (only if not already recorded)
    if (pendingDrop) {
      const segIdx = segments.length - 1;
      const alreadyHasDrop = drops.some(d => d.segIdx === segIdx);
      if (!alreadyHasDrop) {
        drops.push({ segIdx, type: pendingDrop.type });
      }
      pendingDrop = null;
    }
    commitSegment();
    direction = direction === "x" ? "z" : "x";
  } else {
    // Edit mode: only commit if we haven't already reached the end this frame
    // loopEditMode handles commit at segment end, so avoid double-commit
    if (editSegProgress < (editSegments[editSegIdx]?.length || 0)) {
      commitEditSegment();
    }
    direction = direction === "x" ? "z" : "x";
  }
}

function commitSegment() {
  const len = Math.round(currentSegLength * 10) / 10;
  if (len < 0.1) return;
  segments.push({ axis: direction, length: len, width: currentWidth });
  pos.x += direction === "x" ? len : 0;
  pos.z += direction === "z" ? len : 0;
  addTrailSegment(trailLastX, trailLastZ, pos.x, pos.z, false, playerY);
  trailLastX = pos.x;
  trailLastZ = pos.z;
  currentSegLength = 0;
  segCountEl.textContent = "Segments: " + segments.length;
  rebuildPath();
}

function commitEditSegment() {
  // In edit mode, segments are predetermined. Commit just updates position.
  if (editSegIdx >= editSegments.length) return;
  const seg = editSegments[editSegIdx];
  pos.x += seg.axis === "x" ? seg.length : 0;
  pos.z += seg.axis === "z" ? seg.length : 0;
  trailLastX = pos.x;
  trailLastZ = pos.z;
  // Add a trail segment
  addTrailSegment(
    pos.x - (seg.axis === "x" ? seg.length : 0),
    pos.z - (seg.axis === "z" ? seg.length : 0),
    pos.x, pos.z
  );
  editSegIdx++;
  editSegProgress = 0;
  segCountEl.textContent = "Seg " + editSegIdx + " / " + editSegments.length;
}

// --- Drop mechanics ---
function toggleNormalDrop() {
  if (dropState !== "none") {
    // Cancel current drop
    endDrop();
    return;
  }
  if (editSegIdx >= editSegments.length) return;
  // Start normal drop
  dropState = "normal";
  dropProgress = 0;
  dropStartY = playerY;
  const seg = editSegments[editSegIdx];
  dropAxis = seg.axis;
  dropDirection = 1; // forward direction
  // Use targetY from drop data if available
  const dropData = drops.find(d => d.segIdx === editSegIdx);
  dropTargetY = dropData?.targetY ?? -2;
}

function toggleFloatDrop() {
  if (dropState !== "none") {
    endDrop();
    return;
  }
  if (editSegIdx >= editSegments.length) return;
  // Float drop: leap up then fall
  dropState = "float";
  dropProgress = 0;
  dropStartY = playerY;
  const seg = editSegments[editSegIdx];
  dropAxis = seg.axis;
  dropDirection = 1;
  // Use targetY from drop data if available
  const dropData = drops.find(d => d.segIdx === editSegIdx);
  dropTargetY = dropData?.targetY ?? -2;
}

// --- Camera rotation ---
function startCamRotate(dir) {
  const currentSegIdx = editorMode === "edit" ? editSegIdx : segments.length;
  const currentSeg = editorMode === "edit" ? editSegments[editSegIdx] : (segments.length > 0 ? segments[segments.length - 1] : null);
  if (!currentSeg && editorMode === "edit") return;
  // Point A: player current position
  camRotCenterA.set(pos.x, 0.14, pos.z);
  // Point B: slightly forward along current segment direction
  const forwardDist = 2.0; // how far ahead "B" is
  const axis = currentSeg ? currentSeg.axis : "x";
  camRotCenterB.set(
    pos.x + (axis === "x" ? forwardDist : 0),
    0.14,
    pos.z + (axis === "z" ? forwardDist : 0)
  );
  // Midpoint
  camRotMidpoint.lerpVectors(camRotCenterA, camRotCenterB, 0.5);
  // Radius = distance from midpoint to camera at start
  const camCurrent = new THREE.Vector3().copy(camera.position);
  camRotRadius = camCurrent.distanceTo(camRotMidpoint);
  // Direction
  camRotAxis = dir;
  camRotAngle = 0;
  camRotElapsed = 0;
  // Duration - will be set by actual elapsed time on release
  camRotDuration = 9999;
  camRotSpeed = 360 / 4; // placeholder, actual speed based on release duration
  camRotating = true;
}

function updateCamRotate(dt) {
  if (!camRotating) return;
  camRotElapsed += dt;
  const advance = camRotSpeed * dt * camRotAxis * speedMult;
  camRotAngle += advance;
  // Normalize to 0-360
  camRotAngle = ((camRotAngle % 360) + 360) % 360;
  // Calculate center point C on segment AB based on angle
  // At θ=0°/360°: C=A, at θ=180°: C=B
  let cx, cz;
  if (camRotAngle <= 180) {
    const t = camRotAngle / 180;
    cx = camRotCenterA.x + (camRotCenterB.x - camRotCenterA.x) * t;
    cz = camRotCenterA.z + (camRotCenterB.z - camRotCenterA.z) * t;
  } else {
    const t = (camRotAngle - 180) / 180;
    cx = camRotCenterB.x + (camRotCenterA.x - camRotCenterB.x) * t;
    cz = camRotCenterB.z + (camRotCenterA.z - camRotCenterB.z) * t;
  }
  // Orbit center
  const orbitCenter = new THREE.Vector3(cx, 0.14, cz);
  // Camera position = orbit center + radius * (cos, sin)
  const rad = camRotAngle * Math.PI / 180;
  const camX = orbitCenter.x + camRotRadius * Math.cos(rad);
  const camZ = orbitCenter.z + camRotRadius * Math.sin(rad);
  camera.position.set(camX, orbitCenter.y + 5, camZ);
  camera.lookAt(pos.x, 0.14, pos.z);
  if (camRotElapsed >= camRotDuration && camRotDuration < 9999) {
    camRotating = false;
  }
}

async function finish() {
  running = false;
  if (musicAudio) { musicAudio.pause(); musicAudio = null; }
  canvasEl.removeEventListener("pointerdown", onTap);
  window.removeEventListener("keydown", onKey);
  window.removeEventListener("keyup", onKeyUp);
  destroyScene();
  editorEl.classList.remove("active");

  if (editorMode === "edit") {
    // For edit mode, output the level JSON (already loaded)
    jsonOut.value = JSON.stringify(editLevelData, null, 2);
  } else {
    const levelJson = await buildJSON();
    jsonOut.value = JSON.stringify(levelJson, null, 2);
  }
  outputEl.classList.add("active");
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Failed to read audio file"));
    reader.readAsDataURL(file);
  });
}

function buildEffects() {
  const fx = {};
  if (fxFogOn.checked) {
    fx.fog = { color: fxFogColor.value, near: parseFloat(fxFogNear.value), far: parseFloat(fxFogFar.value) };
  }
  if (fxParticles.value) {
    fx.particles = { type: fxParticles.value, count: parseInt(fxParticlesCount.value) };
    if (fxParticles.value === "rain") fx.particles.heavy = fxParticlesHeavy.checked;
  }
  if (fxPathAnim.value) {
    const pa = { type: fxPathAnim.value, revealDist: parseFloat(fxPaReveal.value) };
    if (fxPathAnim.value === "fly-in" || fxPathAnim.value === "ascend" || fxPathAnim.value === "chaos") {
      pa.speed = parseFloat(fxPaSpeed.value);
    }
    if (fxPathAnim.value === "fly-in") pa.sameHeight = fxPaSameHeight.checked;
    if (fxPathAnim.value === "fade-color") {
      pa.fadeColor = fxPaFadeColor.value;
      pa.fadeDuration = parseFloat(fxPaFadeDur.value);
    }
    if (fxPathAnim.value === "chaos") pa.lastEarlyReveal = fxPaLastEarly.checked;
    fx.pathAnimation = pa;
  }
  if (fxLighting.value) {
    fx.lighting = { type: fxLighting.value };
  }
  if (fxReflective.checked) {
    fx.reflectivePath = { emissiveIntensity: 0.4, roughness: 0.3, metalness: 0.4 };
  }
  const brightness = parseFloat(fxBrightness.value);
  if (brightness > 0) fx.playerBrightness = brightness;
  return fx;
}

async function buildJSON() {
  const segs = segments.map((s, i) => {
    const seg = { axis: s.axis, length: Math.round(s.length * 10) / 10, width: s.width };
    // Attach drops to segment
    const drop = drops.find(d => d.segIdx === i);
    if (drop) seg.drop = { type: drop.type, targetY: drop.targetY };
    // Attach camera rotation start to segment
    const camRot = cameraRotations.find(c => c.segIdx === i);
    if (camRot) seg.camRot = { startOffset: camRot.startOffset, duration: camRot.duration, direction: camRot.direction };
    return seg;
  });

  // Calculate audio delay: time for player to traverse starting straight
  const startLength = parseFloat(startLengthEl.value) || 8;
  // Starting platform delay: 2x the platform length / speed
  const audioDelay = speed > 0 ? -(2 * startLength / speed) : 0;

  const result = {
    name: "Custom Level",
    tile: 1.0,
    tempo: speed,
    audioDelay: audioDelay,
    trailWidth: 0.32,
    glow: enableGlowEl.checked,
    effects: buildEffects(),
    theme: {
      sky: bgColor, ground: bgColor,
      tileTop: pathColor, tileSide: darken(pathColor, 0.4),
      line: lineColor, glow: lineColor,
      fogNear: 16, fogFar: 90,
      ambient: darken(bgColor, 0.5), key: lineColor,
      decor: darken(pathColor, 0.3)
    },
    start: { x: 0, z: 0, dir: "x" },
    segments: segs,
    gems: [],
    decor: [],
    totalSegments: segs.length,
    totalTiles: segs.reduce((sum, seg) => sum + seg.length, 0)
  };
  if (musicUrl) {
    if (musicSelect.value === "__upload__" && musicFileEl.files.length > 0) {
      const file = musicFileEl.files[0];
      result.audio = await fileToDataURL(file);
    } else {
      result.audio = musicUrl;
    }
  }
  return result;
}

let camPos = new THREE.Vector3();
let camLook = new THREE.Vector3();

function loop(now) {
  if (!running) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (editorMode === "new") {
    loopNewMode(dt);
  } else {
    loopEditMode(dt);
  }

  updateParticles(dt);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

function loopNewMode(dt) {
  // Update camera rotation first
  updateCamRotate(dt);

  // During drops in new mode, no movement
  if (dropState !== "none") {
    updateDrop(dt);
    return;
  }

  currentSegLength += speed * speedMult * dt;

  const headX = pos.x + (direction === "x" ? currentSegLength : 0);
  const headZ = pos.z + (direction === "z" ? currentSegLength : 0);

  playerMesh.position.set(headX, playerY, headZ);
  updateLiveTrail(headX, headZ);
  updateLivePath(headX, headZ);

  // Camera: fixed offset follow
  if (!camRotating) {
    const targetPos = new THREE.Vector3(headX - 10, 8, headZ - 10);
    const targetLook = new THREE.Vector3(headX, 0, headZ);
    const s = 1 - Math.pow(0.02, dt);
    camPos.lerp(targetPos, s);
    camLook.lerp(targetLook, s);
    camera.position.copy(camPos);
    camera.lookAt(camLook);
  }
}

function loopEditMode(dt) {
  // Update camera rotation first
  updateCamRotate(dt);

  // Handle drops
  if (dropState !== "none") {
    updateDrop(dt);
    return;
  }

  // Move along current segment
  if (editSegIdx < editSegments.length) {
    const seg = editSegments[editSegIdx];
    const moveAmount = speed * dt;
    editSegProgress += moveAmount;

    if (editSegProgress >= seg.length) {
      // Reached end of segment — commit and turn
      const overshoot = editSegProgress - seg.length;
      commitEditSegment();
      if (editSegIdx >= editSegments.length) {
        // Done!
        return;
      }
      // Check for drop on this segment before turning
      const dropForSeg = drops.find(d => d.segIdx === editSegIdx - 1);
      if (dropForSeg && dropState === "none") {
        dropState = dropForSeg.type;
        dropProgress = 0;
        dropStartY = playerY;
        dropTargetY = dropForSeg.targetY ?? -2;
        dropAxis = editSegments[editSegIdx - 1].axis;
        dropDirection = 1;
      }
      // Turn
      direction = direction === "x" ? "z" : "x";
      // Auto-play: automatically turn at corners
      if (editAutoPlaying) {
        // Turn is automatic, no need to do anything
      }
      // Continue with overshoot on next segment
      editSegProgress = overshoot;
    }

    // Update player position
    // pos already marks the start of segment editSegIdx, so head = pos + progress within segment
    const seg2 = editSegments[editSegIdx];
    const headX = pos.x + (seg2.axis === "x" ? editSegProgress : 0);
    const headZ = pos.z + (seg2.axis === "z" ? editSegProgress : 0);

    playerMesh.position.set(headX, 0.14, headZ);

    // Check for automatic camera rotation trigger from JSON data
    if (!camRotating && camRotTriggeredForIdx !== editSegIdx) {
      const camRot = cameraRotations.find(c => c.segIdx === editSegIdx && editSegProgress >= c.startOffset);
      if (camRot) {
        camRotTriggeredForIdx = editSegIdx;
        startCamRotate(camRot.direction);
        camRotDuration = camRot.duration;
        camRotSpeed = 360 / camRotDuration;
      }
    }

    if (!camRotating) {
      const targetPos = new THREE.Vector3(headX - 10, 8, headZ - 10);
      const targetLook = new THREE.Vector3(headX, 0, headZ);
      const s = 1 - Math.pow(0.02, dt);
      camPos.lerp(targetPos, s);
      camLook.lerp(targetLook, s);
      camera.position.copy(camPos);
      camera.lookAt(camLook);
    }
  }
}

function updateDrop(dt) {
  if (dropState === "none") return;
  dropProgress += dt / (dropState === "normal" ? dropTotalTime / speedMult : floatTotalTime / speedMult);
  if (dropProgress > 1) dropProgress = 1;

  const t = dropProgress;
  let y;
  if (dropState === "normal") {
    // Normal drop: fall straight down from dropStartY to dropTargetY
    // No forward movement - purely vertical
    y = dropStartY + (dropTargetY - dropStartY) * t;
  } else if (dropState === "float") {
    // Float drop: leap up then fall (forward movement allowed)
    if (t < 0.4) {
      // Up phase
      const upT = t / 0.4;
      y = dropStartY + (dropStartY + 2.5 - dropStartY) * upT;
    } else {
      // Down phase
      const fallT = (t - 0.4) / 0.6;
      const peakY = dropStartY + 2.5;
      y = peakY + (dropTargetY - peakY) * fallT;
    }
    // Float drops move forward
    const dist = speed * dt * 0.5;
    pos.x += dropAxis === "x" ? dropDirection * dist : 0;
    pos.z += dropAxis === "z" ? dropDirection * dist : 0;
  }

  // Update player position
  playerY = y;
  playerMesh.position.set(pos.x, y, pos.z);

  if (dropProgress >= 1) {
    // Drop complete - auto-end the drop
    playerY = dropTargetY;
    // Call endDrop but only update drops array in new mode
    if (editorMode === "new" && drops.length > 0) {
      const lastDrop = drops[drops.length - 1];
      lastDrop.targetY = dropTargetY;
    }
    dropState = "none";
    dropProgress = 0;
    playerMesh.position.set(pos.x, playerY, pos.z);
  }
}

function endDrop() {
  // End the current drop and update state
  if (dropState === "none") return;
  dropState = "none";
  dropProgress = 0;
  // Update playerY to the dropped position
  playerY = dropTargetY;
  playerMesh.position.set(pos.x, playerY, pos.z);
  // Update the last drop entry's targetY to match where we actually landed
  if (drops.length > 0) {
    const lastDrop = drops[drops.length - 1];
    lastDrop.targetY = dropTargetY;
  }
}

let liveTrailMesh = null;
function updateLiveTrail(headX, headZ) {
  const dx = headX - trailLastX;
  const dz = headZ - trailLastZ;
  const len = Math.hypot(dx, dz);
  if (len < 0.01) {
    if (liveTrailMesh) { liveTrailMesh.visible = false; }
    return;
  }
  const w = widthScale(currentWidth);
  liveTrailMesh.visible = true;
  liveTrailMesh.scale.set(
    Math.abs(dx) > Math.abs(dz) ? len : w,
    1,
    Math.abs(dz) >= Math.abs(dx) ? len : w
  );
  const trailY = playerY + TRAIL_H / 2 + 0.01;
  liveTrailMesh.position.set((trailLastX + headX) / 2, trailY, (trailLastZ + headZ) / 2);
}

let livePathMesh = null;
const PATH_AHEAD = 3.0;
function initLiveMeshes() {
  // Live trail mesh (reused, not rebuilt)
  const trailGeom = new THREE.BoxGeometry(1, TRAIL_H, TRAIL_W);
  liveTrailMesh = new THREE.Mesh(trailGeom, trailMaterial);
  liveTrailMesh.visible = false;
  scene.add(liveTrailMesh);

  // Live path preview mesh (reused)
  const pathGeom = new THREE.BoxGeometry(1, 0.12, 1);
  livePathMesh = new THREE.Mesh(pathGeom, livePathMaterial);
  livePathMesh.receiveShadow = true;
  livePathMesh.renderOrder = 1;
  livePathMesh.visible = false;
  scene.add(livePathMesh);
}
function updateLivePath(headX, headZ) {
  const w = widthScale(currentWidth);
  const totalLen = currentSegLength + PATH_AHEAD;
  if (totalLen < 0.01) {
    if (livePathMesh) livePathMesh.visible = false;
    return;
  }
  livePathMesh.visible = true;
  livePathMesh.scale.set(
    direction === "x" ? totalLen : w,
    0.12,
    direction === "z" ? totalLen : w
  );
  const cx = pos.x + (direction === "x" ? totalLen / 2 : 0);
  const cz = pos.z + (direction === "z" ? totalLen / 2 : 0);
  // Position path at playerY level (top surface at playerY, center at playerY - 0.06)
  livePathMesh.position.set(cx, playerY - 0.06, cz);
}
</script>
