<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Line – Path Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poiret One', sans-serif;
      background: #111;
      color: #eee;
      overflow: hidden;
      height: 100vh;
    }

    #setup {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      background: #111;
    }
    #setup.hidden { display: none; }

    #setup h1 {
      font-size: 1.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .setup-row {
      display: flex; align-items: center; gap: 1rem;
    }
    .setup-row label {
      width: 140px;
      text-align: right;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .setup-row input[type="color"] {
      width: 50px; height: 36px;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    }
    .setup-row input[type="number"],
    .setup-row select {
      padding: 0.4rem 0.7rem;
      font-family: inherit;
      font-size: 0.9rem;
      color: #eee;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
    }
    .setup-row select { width: 220px; }
    .setup-row input[type="number"] { width: 80px; }

    #start-btn {
      margin-top: 1.5rem;
      padding: 0.8rem 2.5rem;
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #eee;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #start-btn:hover { background: rgba(255,255,255,0.2); }

    #editor {
      position: absolute; inset: 0;
      display: none;
    }
    #editor.active { display: block; }

    canvas {
      display: block;
      width: 100%; height: 100%;
    }

    #hud {
      position: absolute;
      top: 1rem; left: 1rem; right: 1rem;
      display: flex; justify-content: space-between; align-items: center;
      pointer-events: none;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.8;
    }
    #hud span { pointer-events: auto; }

    #controls-hint {
      position: absolute;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.5;
      pointer-events: none;
    }

    #finish-btn {
      position: absolute;
      top: 1rem; right: 1rem;
      padding: 0.5rem 1.4rem;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #eee;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      cursor: pointer;
      z-index: 5;
      transition: background 0.2s;
    }
    #finish-btn:hover { background: rgba(255,255,255,0.25); }

    #output {
      position: absolute; inset: 0; z-index: 20;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem;
      background: #111;
      padding: 2rem;
    }
    #output.active { display: flex; }
    #output h2 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #output textarea {
      width: min(90vw, 700px);
      height: 50vh;
      font-family: monospace;
      font-size: 0.8rem;
      background: #1a1a1a;
      color: #aaffcc;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      resize: vertical;
    }
    #copy-btn, #restart-btn {
      padding: 0.6rem 1.8rem;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #eee;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #copy-btn:hover, #restart-btn:hover { background: rgba(255,255,255,0.2); }
    .btn-row { display: flex; gap: 1rem; }
  </style>
</head>
<body>

<div id="setup">
  <h1>Path Editor</h1>
  <div class="setup-row">
    <label>Background</label>
    <input type="color" id="col-bg" value="#0a1f23">
  </div>
  <div class="setup-row">
    <label>Path</label>
    <input type="color" id="col-path" value="#52c5a0">
  </div>
  <div class="setup-row">
    <label>Line</label>
    <input type="color" id="col-line" value="#f4fff8">
  </div>
  <div class="setup-row">
    <label>Start Length</label>
    <input type="number" id="start-length" value="8" min="1" max="50">
  </div>
  <div class="setup-row">
    <label>Music</label>
    <select id="music-select">
      <option value="">None</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/beginning.mp3">The Beginning</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/piano.mp3">The Piano</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/winter.mp3">The Winter</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/desert.mp3">The Desert</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/storm.mp3">The Storm</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/chaos.mp3">The Chaos</option>
      <option value="__upload__">Upload file...</option>
    </select>
    <input type="file" id="music-file" accept="audio/*" style="display:none">
  </div>
  <button id="start-btn">Start Drawing</button>
</div>

<div id="editor">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <span id="width-display">Width: 1</span>
    <span id="seg-count">Segments: 0</span>
  </div>
  <div id="controls-hint">Click/Space = Turn &nbsp;|&nbsp; 1-9 = Path Width &nbsp;|&nbsp; Esc = Finish</div>
  <button id="finish-btn">Finish</button>
</div>

<div id="output">
  <h2>Level JSON</h2>
  <textarea id="json-out" readonly></textarea>
  <div class="btn-row">
    <button id="copy-btn">Copy</button>
    <button id="restart-btn">New</button>
  </div>
</div>

<script>
(function() {
  const setupEl = document.getElementById("setup");
  const editorEl = document.getElementById("editor");
  const outputEl = document.getElementById("output");
  const canvasEl = document.getElementById("canvas");
  const ctx = canvasEl.getContext("2d");

  const colBg = document.getElementById("col-bg");
  const colPath = document.getElementById("col-path");
  const colLine = document.getElementById("col-line");
  const startLengthEl = document.getElementById("start-length");
  const musicSelect = document.getElementById("music-select");
  const musicFileEl = document.getElementById("music-file");
  const startBtn = document.getElementById("start-btn");
  const finishBtn = document.getElementById("finish-btn");
  const widthDisplay = document.getElementById("width-display");
  const segCountEl = document.getElementById("seg-count");
  const jsonOut = document.getElementById("json-out");
  const copyBtn = document.getElementById("copy-btn");
  const restartBtn = document.getElementById("restart-btn");

  let bgColor, pathColor, lineColor;
  let musicUrl = "";
  let musicAudio = null;
  let running = false;
  let segments = [];
  let currentWidth = 1;
  let direction = "x";
  let pos = { x: 0, z: 0 };
  let currentSegLength = 0;
  let speed = 5;
  let lastTime = 0;
  let camera = { x: 0, z: 0 };
  let startLength = 8;

  const TILE = 22;

  // Width 1=1x, 9=5x — exponential curve
  function widthScale(w) {
    return Math.pow(5, (w - 1) / 8);
  }

  let uploadedMusicBlob = null;
  const STORAGE_KEY = "dl-editor-settings";

  function saveSettings() {
    const data = {
      bg: colBg.value,
      path: colPath.value,
      line: colLine.value,
      startLength: startLengthEl.value,
      music: musicSelect.value === "__upload__" ? "" : musicSelect.value
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (_) {}
  }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.bg) colBg.value = data.bg;
      if (data.path) colPath.value = data.path;
      if (data.line) colLine.value = data.line;
      if (data.startLength) startLengthEl.value = data.startLength;
      if (data.music) musicSelect.value = data.music;
    } catch (_) {}
  }

  loadSettings();

  musicSelect.addEventListener("change", () => {
    if (musicSelect.value === "__upload__") {
      musicFileEl.click();
    }
    uploadedMusicBlob = null;
  });
  musicFileEl.addEventListener("change", () => {
    if (musicFileEl.files.length > 0) {
      uploadedMusicBlob = URL.createObjectURL(musicFileEl.files[0]);
    }
  });

  startBtn.addEventListener("click", startEditor);
  finishBtn.addEventListener("click", finish);
  copyBtn.addEventListener("click", () => {
    jsonOut.select();
    navigator.clipboard.writeText(jsonOut.value);
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = "Copy", 1500);
  });
  restartBtn.addEventListener("click", () => {
    outputEl.classList.remove("active");
    setupEl.classList.remove("hidden");
  });

  function startEditor() {
    saveSettings();
    bgColor = colBg.value;
    pathColor = colPath.value;
    lineColor = colLine.value;
    startLength = Math.max(1, parseInt(startLengthEl.value) || 8);

    if (musicSelect.value === "__upload__" && uploadedMusicBlob) {
      musicUrl = uploadedMusicBlob;
    } else if (musicSelect.value && musicSelect.value !== "__upload__") {
      musicUrl = musicSelect.value;
    } else {
      musicUrl = "";
    }

    setupEl.classList.add("hidden");
    editorEl.classList.add("active");

    segments = [];
    currentWidth = 1;
    direction = "x";
    pos = { x: 0, z: 0 };
    currentSegLength = 0;
    camera = { x: 0, z: 0 };
    running = true;

    // Auto-commit starting straight segment
    segments.push({ axis: "x", length: startLength, width: 1 });
    pos.x = startLength;
    segCountEl.textContent = "Segments: 1";

    // Start music if provided
    if (musicAudio) { musicAudio.pause(); musicAudio = null; }
    if (musicUrl) {
      musicAudio = new Audio(musicUrl);
      musicAudio.play().catch(() => {});
    }

    resize();
    window.addEventListener("resize", resize);
    canvasEl.addEventListener("pointerdown", turn);
    window.addEventListener("keydown", onKey);
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function resize() {
    canvasEl.width = window.innerWidth;
    canvasEl.height = window.innerHeight;
  }

  function turn() {
    if (!running) return;
    commitSegment();
    direction = direction === "x" ? "z" : "x";
  }

  function onKey(e) {
    if (!running) return;
    if (e.code === "Space") {
      e.preventDefault();
      turn();
    } else if (e.key >= "1" && e.key <= "9") {
      currentWidth = parseInt(e.key);
      widthDisplay.textContent = "Width: " + currentWidth + " (" + widthScale(currentWidth).toFixed(1) + "x)";
    } else if (e.key === "Escape") {
      finish();
    }
  }

  function commitSegment() {
    if (currentSegLength < 0.1) return;
    const len = Math.round(currentSegLength * 10) / 10;
    segments.push({ axis: direction, length: len, width: currentWidth });
    pos.x += direction === "x" ? len : 0;
    pos.z += direction === "z" ? len : 0;
    currentSegLength = 0;
    segCountEl.textContent = "Segments: " + segments.length;
  }

  function finish() {
    commitSegment();
    running = false;
    if (musicAudio) { musicAudio.pause(); musicAudio = null; }
    window.removeEventListener("resize", resize);
    canvasEl.removeEventListener("pointerdown", turn);
    window.removeEventListener("keydown", onKey);
    editorEl.classList.remove("active");

    const json = buildJSON();
    jsonOut.value = JSON.stringify(json, null, 2);
    outputEl.classList.add("active");
  }

  function buildJSON() {
    const segs = segments.map(s => ({
      axis: s.axis,
      length: s.length,
      width: s.width
    }));

    const result = {
      theme: {
        sky: bgColor,
        ground: bgColor,
        tileTop: pathColor,
        tileSide: darken(pathColor, 0.4),
        line: lineColor,
        glow: lineColor,
        fogNear: 16,
        fogFar: 90,
        ambient: darken(bgColor, 0.5),
        key: lineColor,
        decor: darken(pathColor, 0.3)
      },
      start: { x: 0, z: 0, dir: "x" },
      segments: segs,
      totalSegments: segs.length,
      totalTiles: segs.reduce((s, seg) => s + seg.length, 0)
    };
    if (musicUrl) {
      if (musicUrl.startsWith("blob:") && musicFileEl.files.length > 0) {
        result.audio = musicFileEl.files[0].name;
      } else {
        result.audio = musicUrl;
      }
    }
    return result;
  }

  function darken(hex, amount) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    r = Math.round(r * (1 - amount));
    g = Math.round(g * (1 - amount));
    b = Math.round(b * (1 - amount));
    return "#" + [r,g,b].map(c => c.toString(16).padStart(2,"0")).join("");
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    currentSegLength += speed * dt;

    const headX = pos.x + (direction === "x" ? currentSegLength : 0);
    const headZ = pos.z + (direction === "z" ? currentSegLength : 0);

    // Smooth camera follow (no wobble — use tight lerp)
    camera.x += (headX - camera.x) * Math.min(1, dt * 5);
    camera.z += (headZ - camera.z) * Math.min(1, dt * 5);

    draw(headX, headZ);
    requestAnimationFrame(loop);
  }

  // Isometric projection: 45-degree rotation, foreshortened Z (simulates ~45 deg camera pitch)
  function toScreen(tx, tz, camX, camZ, cx, cy) {
    const rx = tx - camX;
    const rz = tz - camZ;
    // Rotate 45 degrees so line always goes diagonally on screen
    const cos45 = 0.7071;
    const isoX = (rx - rz) * cos45;
    const isoY = (rx + rz) * cos45 * 0.5; // foreshorten Y for ~45 deg pitch
    return {
      x: cx + isoX * TILE,
      y: cy + isoY * TILE
    };
  }

  function draw(headX, headZ) {
    const W = canvasEl.width;
    const H = canvasEl.height;
    const cx = W / 2;
    const cy = H * 0.55; // slightly below center for "behind and above" feel

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, W, H);

    function scr(tx, tz) {
      return toScreen(tx, tz, camera.x, camera.z, cx, cy);
    }

    // Draw committed path segments
    ctx.lineCap = "square";
    ctx.lineJoin = "miter";
    let drawPos = { x: 0, z: 0 };
    for (const seg of segments) {
      const from = scr(drawPos.x, drawPos.z);
      const endX = drawPos.x + (seg.axis === "x" ? seg.length : 0);
      const endZ = drawPos.z + (seg.axis === "z" ? seg.length : 0);
      const to = scr(endX, endZ);

      ctx.strokeStyle = pathColor;
      ctx.lineWidth = widthScale(seg.width) * TILE * 0.9;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
      ctx.globalAlpha = 1;

      drawPos.x = endX;
      drawPos.z = endZ;
    }

    // Draw current (in-progress) segment
    {
      const from = scr(pos.x, pos.z);
      const to = scr(headX, headZ);
      ctx.strokeStyle = pathColor;
      ctx.lineWidth = widthScale(currentWidth) * TILE * 0.9;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Draw the player line trail (thick cubes)
    const cubeSize = TILE * 0.5;
    drawPos = { x: 0, z: 0 };
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = cubeSize;
    ctx.lineCap = "square";
    ctx.lineJoin = "miter";
    ctx.globalAlpha = 0.95;
    ctx.beginPath();
    const startPt = scr(0, 0);
    ctx.moveTo(startPt.x, startPt.y);
    for (const seg of segments) {
      const endX = drawPos.x + (seg.axis === "x" ? seg.length : 0);
      const endZ = drawPos.z + (seg.axis === "z" ? seg.length : 0);
      const to = scr(endX, endZ);
      ctx.lineTo(to.x, to.y);
      drawPos.x = endX;
      drawPos.z = endZ;
    }
    const headScr = scr(headX, headZ);
    ctx.lineTo(headScr.x, headScr.y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Draw player head cube
    const half = cubeSize * 0.6;
    ctx.fillStyle = lineColor;
    ctx.shadowColor = lineColor;
    ctx.shadowBlur = 16;
    ctx.fillRect(headScr.x - half, headScr.y - half, half * 2, half * 2);
    ctx.shadowBlur = 0;

    // Draw corner markers
    drawPos = { x: 0, z: 0 };
    for (const seg of segments) {
      const endX = drawPos.x + (seg.axis === "x" ? seg.length : 0);
      const endZ = drawPos.z + (seg.axis === "z" ? seg.length : 0);
      const p = scr(endX, endZ);
      ctx.fillStyle = lineColor;
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      drawPos.x = endX;
      drawPos.z = endZ;
    }
  }
})();
</script>
</body>
</html>
