<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Line – Path Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.168.0/build/three.module.js" } }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poiret One', sans-serif;
      background: #111;
      color: #eee;
      overflow: hidden;
      height: 100vh;
    }

    #setup {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.4rem;
      background: #111;
    }
    #setup.hidden { display: none; }
    #setup h1 {
      font-size: 1.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .setup-row {
      display: flex; align-items: center; gap: 1rem;
    }
    .setup-row label {
      width: 140px;
      text-align: right;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .setup-row input[type="color"] {
      width: 50px; height: 36px;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    }
    .setup-row input[type="number"],
    .setup-row select {
      padding: 0.4rem 0.7rem;
      font-family: inherit;
      font-size: 0.9rem;
      color: #eee;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
    }
    .setup-row select { width: 220px; }
    .setup-row input[type="number"] { width: 80px; }

    .btn {
      padding: 0.7rem 2.2rem;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #eee;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.2); }

    #editor { position: absolute; inset: 0; display: none; }
    #editor.active { display: block; }

    canvas { display: block; width: 100%; height: 100%; }

    #hud {
      position: absolute;
      top: 1rem; left: 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.8;
      line-height: 1.8;
    }

    #controls-hint {
      position: absolute;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.45;
      pointer-events: none;
      white-space: nowrap;
    }

    #finish-btn {
      position: absolute;
      top: 1rem; right: 1.5rem;
      z-index: 5;
    }

    #output {
      position: absolute; inset: 0; z-index: 20;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem;
      background: #111;
      padding: 2rem;
    }
    #output.active { display: flex; }
    #output h2 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #output textarea {
      width: min(90vw, 700px);
      height: 50vh;
      font-family: monospace;
      font-size: 0.8rem;
      background: #1a1a1a;
      color: #aaffcc;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      resize: vertical;
    }
    .btn-row { display: flex; gap: 1rem; }
  </style>
</head>
<body>

<div id="setup">
  <h1>Path Editor</h1>
  <div class="setup-row">
    <label>Background</label>
    <input type="color" id="col-bg" value="#0a1f23">
  </div>
  <div class="setup-row">
    <label>Path</label>
    <input type="color" id="col-path" value="#52c5a0">
  </div>
  <div class="setup-row">
    <label>Line</label>
    <input type="color" id="col-line" value="#f4fff8">
  </div>
  <div class="setup-row">
    <label>Start Length</label>
    <input type="number" id="start-length" value="8" min="1" max="50">
  </div>
  <div class="setup-row">
    <label>Start Width</label>
    <input type="number" id="start-width" value="1" min="1" max="9">
  </div>
  <div class="setup-row">
    <label>Music</label>
    <select id="music-select">
      <option value="">None</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/beginning.mp3">The Beginning</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/piano.mp3">The Piano</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/winter.mp3">The Winter</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/desert.mp3">The Desert</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/storm.mp3">The Storm</option>
      <option value="https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/chaos.mp3">The Chaos</option>
      <option value="__upload__">Upload file...</option>
    </select>
    <input type="file" id="music-file" accept="audio/*" style="display:none">
  </div>
  <button class="btn" id="start-btn" style="margin-top:1rem">Start Drawing</button>
</div>

<div id="editor">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="width-display">Width: 1 (1.0x)</div>
    <div id="seg-count">Segments: 0</div>
  </div>
  <div id="controls-hint">Click / Space = Turn &nbsp;&bull;&nbsp; 1-9 = Path Width &nbsp;&bull;&nbsp; Esc = Finish</div>
  <button class="btn" id="finish-btn">Finish</button>
</div>

<div id="output">
  <h2>Level JSON</h2>
  <textarea id="json-out" readonly></textarea>
  <div class="btn-row">
    <button class="btn" id="copy-btn">Copy</button>
    <button class="btn" id="restart-btn">New</button>
  </div>
</div>

<script type="module">
import * as THREE from "three";

const setupEl = document.getElementById("setup");
const editorEl = document.getElementById("editor");
const outputEl = document.getElementById("output");
const canvasEl = document.getElementById("canvas");

const colBg = document.getElementById("col-bg");
const colPath = document.getElementById("col-path");
const colLine = document.getElementById("col-line");
const startLengthEl = document.getElementById("start-length");
const startWidthEl = document.getElementById("start-width");
const musicSelect = document.getElementById("music-select");
const musicFileEl = document.getElementById("music-file");
const startBtn = document.getElementById("start-btn");
const finishBtn = document.getElementById("finish-btn");
const widthDisplay = document.getElementById("width-display");
const segCountEl = document.getElementById("seg-count");
const jsonOut = document.getElementById("json-out");
const copyBtn = document.getElementById("copy-btn");
const restartBtn = document.getElementById("restart-btn");

// Width: 1=1x, 9=5x exponential
function widthScale(w) { return Math.pow(5, (w - 1) / 8); }

const STORAGE_KEY = "dl-editor-settings";
function saveSettings() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      bg: colBg.value, path: colPath.value, line: colLine.value,
      startLength: startLengthEl.value, startWidth: startWidthEl.value,
      music: musicSelect.value === "__upload__" ? "" : musicSelect.value
    }));
  } catch (_) {}
}
function loadSettings() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!d) return;
    if (d.bg) colBg.value = d.bg;
    if (d.path) colPath.value = d.path;
    if (d.line) colLine.value = d.line;
    if (d.startLength) startLengthEl.value = d.startLength;
    if (d.startWidth) startWidthEl.value = d.startWidth;
    if (d.music) musicSelect.value = d.music;
  } catch (_) {}
}
loadSettings();

let uploadedMusicBlob = null;
musicSelect.addEventListener("change", () => {
  if (musicSelect.value === "__upload__") musicFileEl.click();
  uploadedMusicBlob = null;
});
musicFileEl.addEventListener("change", () => {
  if (musicFileEl.files.length > 0) uploadedMusicBlob = URL.createObjectURL(musicFileEl.files[0]);
});

// --- State ---
let running = false;
let segments = [];
let currentWidth = 1;
let direction = "x";
let pos = { x: 0, z: 0 };
let currentSegLength = 0;
const speed = 5;
let musicUrl = "";
let musicAudio = null;

// --- Three.js scene ---
let renderer, scene, camera;
let playerMesh, trailGroup, pathGroup;
let lastTime = 0;

function darken(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.round(r * (1 - amount));
  g = Math.round(g * (1 - amount));
  b = Math.round(b * (1 - amount));
  return "#" + [r, g, b].map(c => c.toString(16).padStart(2, "0")).join("");
}

function initScene(bgColor, pathColor, lineColor) {
  renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(bgColor);
  scene.fog = new THREE.Fog(bgColor, 30, 120);

  // Lights
  const hemi = new THREE.HemisphereLight(bgColor, darken(bgColor, 0.5), 0.6);
  scene.add(hemi);
  const amb = new THREE.AmbientLight(new THREE.Color(bgColor), 0.4);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(15, 25, 10);
  dir.castShadow = true;
  dir.shadow.mapSize.set(2048, 2048);
  dir.shadow.camera.near = 1;
  dir.shadow.camera.far = 100;
  dir.shadow.camera.left = -50;
  dir.shadow.camera.right = 50;
  dir.shadow.camera.top = 50;
  dir.shadow.camera.bottom = -50;
  scene.add(dir);

  // Ground
  const groundMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(bgColor), roughness: 0.95 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.25;
  ground.receiveShadow = true;
  scene.add(ground);

  camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 250);
  camera.position.set(-10, 8, -5);
  camera.lookAt(0, 0, 0);

  // Groups
  pathGroup = new THREE.Group();
  scene.add(pathGroup);
  trailGroup = new THREE.Group();
  scene.add(trailGroup);

  // Player head — same size and color as trail (centered on position)
  const playerGeom = new THREE.BoxGeometry(0.5, 0.28, 0.5); // matches TRAIL_W
  const playerMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(lineColor),
    emissive: new THREE.Color(lineColor),
    emissiveIntensity: 0.4,
    roughness: 0.45,
  });
  playerMesh = new THREE.Mesh(playerGeom, playerMat);
  playerMesh.castShadow = true;
  playerMesh.position.set(0, 0.14, 0);
  scene.add(playerMesh);

  window.addEventListener("resize", onResize);
}

function onResize() {
  if (!renderer) return;
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}

function destroyScene() {
  window.removeEventListener("resize", onResize);
  if (renderer) {
    renderer.dispose();
    scene.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
    renderer = null;
    scene = null;
  }
}

let pathMaterial, trailMaterial, bgColor, pathColor, lineColor;

function buildPathMesh(axis, length, width, startX, startZ) {
  const w = widthScale(width);
  const geom = new THREE.BoxGeometry(
    axis === "x" ? length : w,
    0.12,
    axis === "z" ? length : w
  );
  const mesh = new THREE.Mesh(geom, pathMaterial);
  mesh.receiveShadow = true;
  // Center the path on the line (player travels along the center)
  const cx = startX + (axis === "x" ? length / 2 : 0);
  const cz = startZ + (axis === "z" ? length / 2 : 0);
  mesh.position.set(cx, -0.06, cz);
  return mesh;
}

function rebuildPath() {
  while (pathGroup.children.length) {
    const c = pathGroup.children[0];
    pathGroup.remove(c);
    c.geometry.dispose();
  }
  let dx = 0, dz = 0;
  for (const seg of segments) {
    const mesh = buildPathMesh(seg.axis, seg.length, seg.width, dx, dz);
    pathGroup.add(mesh);
    dx += seg.axis === "x" ? seg.length : 0;
    dz += seg.axis === "z" ? seg.length : 0;
  }
}

const TRAIL_W = 0.5;
function addTrailSegment(fromX, fromZ, toX, toZ) {
  const dx = toX - fromX;
  const dz = toZ - fromZ;
  const len = Math.hypot(dx, dz);
  if (len < 0.01) return;
  // Extend by half trail width at each end to cover corners cleanly
  const ext = TRAIL_W / 2;
  const totalLen = len + ext;
  const geom = new THREE.BoxGeometry(
    Math.abs(dx) > Math.abs(dz) ? totalLen : TRAIL_W,
    0.28,
    Math.abs(dz) >= Math.abs(dx) ? totalLen : TRAIL_W
  );
  const mesh = new THREE.Mesh(geom, trailMaterial);
  mesh.castShadow = true;
  // Shift center slightly toward 'to' end (extend forward, not backward)
  const cx = (fromX + toX) / 2 + (Math.sign(dx) * ext / 2);
  const cz = (fromZ + toZ) / 2 + (Math.sign(dz) * ext / 2);
  mesh.position.set(cx, 0.14, cz);
  trailGroup.add(mesh);
}

let trailLastX = 0, trailLastZ = 0;

// --- Editor logic ---
startBtn.addEventListener("click", startEditor);
finishBtn.addEventListener("click", finish);
copyBtn.addEventListener("click", () => {
  jsonOut.select();
  navigator.clipboard.writeText(jsonOut.value);
  copyBtn.textContent = "Copied!";
  setTimeout(() => copyBtn.textContent = "Copy", 1500);
});
restartBtn.addEventListener("click", () => {
  outputEl.classList.remove("active");
  setupEl.classList.remove("hidden");
});

function startEditor() {
  saveSettings();
  bgColor = colBg.value;
  pathColor = colPath.value;
  lineColor = colLine.value;
  const startLength = Math.max(1, parseInt(startLengthEl.value) || 8);

  if (musicSelect.value === "__upload__" && uploadedMusicBlob) {
    musicUrl = uploadedMusicBlob;
  } else if (musicSelect.value && musicSelect.value !== "__upload__") {
    musicUrl = musicSelect.value;
  } else {
    musicUrl = "";
  }

  setupEl.classList.add("hidden");
  editorEl.classList.add("active");

  segments = [];
  currentWidth = Math.max(1, Math.min(9, parseInt(startWidthEl.value) || 1));
  direction = "x";
  pos = { x: 0, z: 0 };
  currentSegLength = 0;
  widthDisplay.textContent = "Width: " + currentWidth + " (" + widthScale(currentWidth).toFixed(1) + "x)";

  initScene(bgColor, pathColor, lineColor);

  pathMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(pathColor),
    roughness: 0.8,
    transparent: true,
    opacity: 0.55,
  });
  trailMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(lineColor),
    emissive: new THREE.Color(lineColor),
    emissiveIntensity: 0.4,
    roughness: 0.45,
  });

  // Commit the starting straight segment using start width
  segments.push({ axis: "x", length: startLength, width: currentWidth });
  pos.x = startLength;
  rebuildPath();
  segCountEl.textContent = "Segments: 1";

  // Trail for starting segment
  trailLastX = 0;
  trailLastZ = 0;
  addTrailSegment(0, 0, pos.x, pos.z);
  trailLastX = pos.x;
  trailLastZ = pos.z;

  // Position player and camera
  playerMesh.position.set(pos.x, 0.14, pos.z);
  camPos = new THREE.Vector3(pos.x - 10, 8, pos.z - 5);
  camLook = new THREE.Vector3(pos.x, 0, pos.z);
  camera.position.copy(camPos);
  camera.lookAt(camLook);

  // Start music
  if (musicAudio) { musicAudio.pause(); musicAudio = null; }
  if (musicUrl) {
    musicAudio = new Audio(musicUrl);
    musicAudio.play().catch(() => {});
  }

  running = true;
  canvasEl.addEventListener("pointerdown", onTap);
  window.addEventListener("keydown", onKey);
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function onTap(e) {
  if (e.target && e.target.closest("button")) return;
  turn();
}

function onKey(e) {
  if (!running) return;
  if (e.code === "Space") { e.preventDefault(); turn(); }
  else if (e.key >= "1" && e.key <= "9") {
    currentWidth = parseInt(e.key);
    widthDisplay.textContent = "Width: " + currentWidth + " (" + widthScale(currentWidth).toFixed(1) + "x)";
  }
  else if (e.key === "Escape") finish();
}

function turn() {
  if (!running) return;
  commitSegment();
  direction = direction === "x" ? "z" : "x";
}

function commitSegment() {
  const len = Math.round(currentSegLength * 10) / 10;
  if (len < 0.1) return;
  segments.push({ axis: direction, length: len, width: currentWidth });
  pos.x += direction === "x" ? len : 0;
  pos.z += direction === "z" ? len : 0;

  // Add trail for this segment
  addTrailSegment(trailLastX, trailLastZ, pos.x, pos.z);
  trailLastX = pos.x;
  trailLastZ = pos.z;

  currentSegLength = 0;
  segCountEl.textContent = "Segments: " + segments.length;
  rebuildPath();
}

function finish() {
  commitSegment();
  running = false;
  if (musicAudio) { musicAudio.pause(); musicAudio = null; }
  canvasEl.removeEventListener("pointerdown", onTap);
  window.removeEventListener("keydown", onKey);
  destroyScene();
  editorEl.classList.remove("active");

  jsonOut.value = JSON.stringify(buildJSON(), null, 2);
  outputEl.classList.add("active");
}

function buildJSON() {
  const segs = segments.map(s => ({ axis: s.axis, length: s.length, width: s.width }));
  const result = {
    theme: {
      sky: bgColor, ground: bgColor,
      tileTop: pathColor, tileSide: darken(pathColor, 0.4),
      line: lineColor, glow: lineColor,
      fogNear: 16, fogFar: 90,
      ambient: darken(bgColor, 0.5), key: lineColor,
      decor: darken(pathColor, 0.3)
    },
    start: { x: 0, z: 0, dir: "x" },
    segments: segs,
    totalSegments: segs.length,
    totalTiles: segs.reduce((sum, seg) => sum + seg.length, 0)
  };
  if (musicUrl) {
    result.audio = musicUrl.startsWith("blob:") && musicFileEl.files.length > 0
      ? musicFileEl.files[0].name : musicUrl;
  }
  return result;
}

let camPos = new THREE.Vector3();
let camLook = new THREE.Vector3();

function loop(now) {
  if (!running) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  currentSegLength += speed * dt;

  // Current head world position (CENTER of player)
  const headX = pos.x + (direction === "x" ? currentSegLength : 0);
  const headZ = pos.z + (direction === "z" ? currentSegLength : 0);

  // Update player position
  playerMesh.position.set(headX, 0.14, headZ);

  // Live trail from last commit to head
  updateLiveTrail(headX, headZ);

  // Live path preview
  updateLivePath(headX, headZ);

  // Camera: always BEHIND the player based on current direction
  // The camera offset is opposite to the direction of movement
  let offsetX, offsetZ;
  if (direction === "x") {
    offsetX = -10;
    offsetZ = -5;
  } else {
    offsetX = -5;
    offsetZ = -10;
  }
  const targetPos = new THREE.Vector3(headX + offsetX, 8, headZ + offsetZ);
  const targetLook = new THREE.Vector3(headX, 0, headZ);

  // Very smooth exponential follow
  const s = 1 - Math.pow(0.005, dt);
  camPos.lerp(targetPos, s);
  camLook.lerp(targetLook, s);
  camera.position.copy(camPos);
  camera.lookAt(camLook);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

let liveTrailMesh = null;
function updateLiveTrail(headX, headZ) {
  if (liveTrailMesh) { scene.remove(liveTrailMesh); liveTrailMesh.geometry.dispose(); }
  const dx = headX - trailLastX;
  const dz = headZ - trailLastZ;
  const len = Math.hypot(dx, dz);
  if (len < 0.01) return;
  const geom = new THREE.BoxGeometry(
    Math.abs(dx) > Math.abs(dz) ? len : TRAIL_W,
    0.28,
    Math.abs(dz) >= Math.abs(dx) ? len : TRAIL_W
  );
  liveTrailMesh = new THREE.Mesh(geom, trailMaterial);
  liveTrailMesh.castShadow = true;
  liveTrailMesh.position.set((trailLastX + headX) / 2, 0.14, (trailLastZ + headZ) / 2);
  scene.add(liveTrailMesh);
}

let livePathMesh = null;
function updateLivePath(headX, headZ) {
  if (livePathMesh) { scene.remove(livePathMesh); livePathMesh.geometry.dispose(); }
  const len = currentSegLength;
  if (len < 0.01) return;
  const w = widthScale(currentWidth);
  const geom = new THREE.BoxGeometry(
    direction === "x" ? len : w,
    0.12,
    direction === "z" ? len : w
  );
  livePathMesh = new THREE.Mesh(geom, pathMaterial);
  livePathMesh.receiveShadow = true;
  const cx = pos.x + (direction === "x" ? len / 2 : 0);
  const cz = pos.z + (direction === "z" ? len / 2 : 0);
  livePathMesh.position.set(cx, -0.06, cz);
  scene.add(livePathMesh);
}
</script>
</body>
</html>
