<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1f23" />
    <title>Dancing Line</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap"
      rel="stylesheet"
    />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.168.0/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg-far: #0a1f23;
        --bg-mid: #16524a;
        --bg-near: #52c5a0;
        --ink: #ffffff;
        --ink-soft: rgba(255, 255, 255, 0.72);
        --ink-faint: rgba(255, 255, 255, 0.36);
        --line: #f4fff8;
        --glow: rgba(160, 255, 220, 0.55);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: "Poiret One", system-ui, sans-serif;
        font-weight: 400;
        color: var(--ink);
        background:
          radial-gradient(120% 80% at 50% 110%, var(--bg-near) 0%, transparent 60%),
          radial-gradient(90% 60% at 50% -10%, color-mix(in srgb, var(--bg-far) 75%, #000), transparent 70%),
          linear-gradient(180deg, var(--bg-far), var(--bg-mid) 55%, var(--bg-near));
        transition: background 750ms ease;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      canvas#scene,
      canvas#game {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
      }

      canvas#game {
        z-index: 0;
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          radial-gradient(120% 90% at 50% 50%, transparent 50%, rgba(0, 0, 0, 0.55) 100%);
      }

      .stage {
        position: fixed;
        inset: 0;
        z-index: 2;
      }

      .screen {
        position: absolute;
        inset: 0;
        display: grid;
        opacity: 0;
        pointer-events: none;
        transition: opacity 380ms ease, transform 380ms ease;
        transform: translateY(8px);
      }

      .screen.is-active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      button {
        font: inherit;
        color: inherit;
        background: transparent;
        border: 0;
        cursor: pointer;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      /* ───────── BOOT ───────── */

      .boot {
        place-items: center;
        cursor: pointer;
        padding: 1rem;
      }

      .boot__inner {
        text-align: center;
        transform: translateY(-3vh);
      }

      .boot__title {
        font-size: clamp(3.5rem, 14vw, 11rem);
        letter-spacing: 0.085em;
        text-transform: uppercase;
        line-height: 0.92;
        text-shadow: 0 0 1.8rem rgba(255, 255, 255, 0.22);
      }

      .boot__rule {
        display: block;
        width: clamp(7rem, 18vw, 13rem);
        height: 2px;
        margin: 1.6rem auto 1.5rem;
        background: var(--line);
        box-shadow: 0 0 18px var(--glow);
      }

      .boot__prompt {
        font-size: clamp(0.95rem, 1.6vw, 1.2rem);
        letter-spacing: 0.5em;
        text-indent: 0.5em;
        text-transform: uppercase;
        color: var(--ink-soft);
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }

      /* ───────── SELECT ───────── */

      .select {
        grid-template-rows: auto 1fr auto;
        padding: max(env(safe-area-inset-top), 1.2rem) 1.2rem
          max(env(safe-area-inset-bottom), 1.5rem);
      }

      .select__top {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 1rem;
        padding: 0.4rem 0.4rem 0;
      }

      .select__heading {
        text-align: center;
        font-size: clamp(0.9rem, 1.5vw, 1.1rem);
        letter-spacing: 0.55em;
        text-indent: 0.55em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .select__main {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: clamp(0.5rem, 3vw, 2.5rem);
        padding: 0 clamp(0.5rem, 4vw, 3rem);
      }

      .select__hero {
        text-align: center;
      }

      .select__num {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: clamp(0.95rem, 1.7vw, 1.2rem);
        letter-spacing: 0.45em;
        color: var(--ink-faint);
        margin-bottom: 1.1rem;
      }

      .select__num i {
        font-style: normal;
        opacity: 0.6;
      }

      .select__name {
        font-size: clamp(2.6rem, 9.5vw, 8rem);
        letter-spacing: 0.06em;
        line-height: 0.95;
        text-transform: uppercase;
        text-shadow: 0 0 2rem rgba(255, 255, 255, 0.18);
        transition: opacity 260ms ease, transform 260ms ease, filter 260ms ease;
      }

      .select__name.is-swap {
        opacity: 0;
        filter: blur(6px);
        transform: translateY(8px);
      }

      .select__bottom {
        display: grid;
        gap: 1.5rem;
        justify-items: center;
        padding-top: 1rem;
      }

      .dots {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      .dot {
        width: 6px;
        height: 6px;
        background: var(--ink-faint);
        transform: rotate(45deg);
        transition: background 200ms ease, transform 200ms ease, box-shadow 200ms ease;
      }

      .dot.is-active {
        background: var(--ink);
        transform: rotate(45deg) scale(1.6);
        box-shadow: 0 0 12px var(--ink);
      }

      .icon {
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .arrow {
        width: clamp(2.6rem, 5vw, 3.4rem);
        height: clamp(2.6rem, 5vw, 3.4rem);
        display: grid;
        place-items: center;
        color: var(--ink-soft);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--ink-faint);
        border-radius: 999px;
        transition: background 200ms ease, border-color 200ms ease, color 200ms ease,
          transform 200ms ease;
      }

      .arrow .icon {
        width: 42%;
        height: 42%;
      }

      .arrow:hover,
      .arrow:focus-visible {
        outline: none;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--ink);
        transform: scale(1.05);
      }

      .play-cta {
        width: clamp(4.4rem, 10vw, 5.8rem);
        height: clamp(4.4rem, 10vw, 5.8rem);
        display: grid;
        place-items: center;
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--ink);
        border-radius: 50%;
        transition: background 220ms ease, color 220ms ease, transform 220ms ease,
          box-shadow 220ms ease;
      }

      .play-cta .icon {
        width: 38%;
        height: 38%;
        transform: translateX(6%);
      }

      .play-cta:hover,
      .play-cta:focus-visible {
        outline: none;
        background: var(--ink);
        color: var(--bg-far);
        transform: scale(1.05);
        box-shadow: 0 0 36px rgba(255, 255, 255, 0.4);
      }

      .test-btn {
        position: absolute;
        bottom: 1.2rem;
        right: 1.5rem;
        padding: 0.45rem 1.2rem;
        font-family: inherit;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink);
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--ink-faint);
        border-radius: 999px;
        cursor: pointer;
        transition: background 200ms;
      }
      .test-btn:hover { background: rgba(255,255,255,0.18); }

      .test-modal {
        position: fixed; inset: 0; z-index: 50;
        display: none; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1rem;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(6px);
        padding: 2rem;
      }
      .test-modal.is-active { display: flex; }
      .test-modal__title {
        font-size: 1.2rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .test-modal__input {
        width: min(85vw, 600px);
        height: 40vh;
        font-family: monospace;
        font-size: 0.8rem;
        background: #1a1a1a;
        color: #aaffcc;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 1rem;
        resize: vertical;
      }
      .test-modal__actions { display: flex; gap: 1rem; }
      .test-modal__btn {
        padding: 0.55rem 1.6rem;
        font-family: inherit;
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #eee;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 999px;
        cursor: pointer;
        transition: background 200ms;
      }
      .test-modal__btn:hover { background: rgba(255,255,255,0.2); }

      .ico {
        width: 2.6rem;
        height: 2.6rem;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--ink-faint);
        border-radius: 50%;
        backdrop-filter: blur(8px);
        transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
      }

      .ico .icon {
        width: 42%;
        height: 42%;
      }

      .ico:hover,
      .ico:focus-visible {
        outline: none;
        background: rgba(255, 255, 255, 0.18);
        border-color: var(--ink);
      }

      .ico.ghost {
        background: transparent;
        border-color: transparent;
        cursor: default;
        pointer-events: none;
      }

      .ico-lg {
        width: clamp(3.6rem, 7vw, 4.5rem);
        height: clamp(3.6rem, 7vw, 4.5rem);
        display: grid;
        place-items: center;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--ink-faint);
        border-radius: 50%;
        transition: background 200ms ease, border-color 200ms ease, color 200ms ease,
          transform 200ms ease;
      }

      .ico-lg .icon {
        width: 42%;
        height: 42%;
      }

      .ico-lg[data-resume] .icon {
        transform: translateX(6%);
      }

      .ico-lg:hover,
      .ico-lg:focus-visible {
        outline: none;
        background: rgba(255, 255, 255, 0.16);
        border-color: var(--ink);
        transform: scale(1.05);
      }

      /* ───────── GAME HUD ───────── */

      .game {
        grid-template-rows: auto 1fr auto;
      }

      .tap {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .hud {
        position: relative;
        z-index: 2;
        display: contents;
      }

      .hud__top {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 1rem;
        padding: max(env(safe-area-inset-top), 1.1rem) 1.2rem 0;
      }

      .hud__name {
        text-align: center;
        font-size: clamp(0.9rem, 1.6vw, 1.1rem);
        letter-spacing: 0.55em;
        text-indent: 0.55em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .hud__gems {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-size: clamp(1rem, 1.7vw, 1.25rem);
        letter-spacing: 0.18em;
        color: var(--ink);
      }

      .gem {
        width: 14px;
        height: 14px;
        color: var(--ink);
        filter: drop-shadow(0 0 8px var(--ink));
      }

      .hud__bottom {
        align-self: end;
        padding: 0 clamp(1rem, 6vw, 4rem) max(env(safe-area-inset-bottom), 1.4rem);
      }

      .hud__progress {
        position: relative;
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
      }

      .hud__progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0%;
        background: var(--ink);
        box-shadow: 0 0 14px var(--ink);
        transition: width 90ms linear;
      }

      /* ───────── PAUSE MODAL ───────── */

      .modal {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      .modal.is-active {
        opacity: 1;
        pointer-events: auto;
      }

      .modal__inner {
        display: grid;
        gap: 0.5rem;
        justify-items: center;
        text-align: center;
        padding: 2rem;
      }

      .modal__title {
        font-size: clamp(2.2rem, 7vw, 4.6rem);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-bottom: 1.6rem;
      }

      .modal__row {
        display: flex;
        gap: clamp(0.8rem, 2vw, 1.4rem);
        align-items: center;
      }

      .modal__sub {
        margin-bottom: 0.6rem;
        color: var(--ink-soft);
        font-size: clamp(0.95rem, 1.6vw, 1.15rem);
        letter-spacing: 0.4em;
        text-indent: 0.4em;
        text-transform: uppercase;
      }

      .gem-tally {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        margin-bottom: 0.5rem;
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        letter-spacing: 0.18em;
        color: var(--ink);
      }

      .gem-tally .gem {
        width: 16px;
        height: 16px;
      }

      .toast {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 4;
        padding: 0.85rem 1.6rem;
        transform: translate(-50%, -50%);
        color: var(--ink);
        font-size: clamp(0.95rem, 1.6vw, 1.15rem);
        letter-spacing: 0.4em;
        text-indent: 0.4em;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid var(--ink-faint);
        border-radius: 999px;
        backdrop-filter: blur(8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .toast.is-active {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(-1.5rem);
      }

      .tap-prompt {
        position: absolute;
        bottom: 18%;
        left: 50%;
        z-index: 4;
        transform: translateX(-50%);
        color: var(--ink);
        font-size: clamp(1rem, 1.8vw, 1.3rem);
        letter-spacing: 0.35em;
        text-indent: 0.35em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
      }

      .tap-prompt.is-active {
        animation: tapPulse 1.6s ease-in-out infinite;
      }

      @keyframes tapPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      .vignette--die {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: radial-gradient(120% 90% at 50% 50%, transparent 40%, rgba(180, 30, 60, 0.55) 100%);
        opacity: 0;
        transition: opacity 320ms ease;
      }

      .vignette--die.is-active {
        opacity: 1;
      }

      /* ───────── TAP RIPPLE ───────── */

      .ripple {
        position: absolute;
        width: 90px;
        height: 90px;
        margin: -45px 0 0 -45px;
        border: 2px solid var(--line);
        border-radius: 50%;
        opacity: 0.7;
        pointer-events: none;
        animation: ripple 520ms ease-out forwards;
      }

      @keyframes ripple {
        to {
          transform: scale(2.4);
          opacity: 0;
        }
      }

      /* ───────── RESPONSIVE ───────── */

      @media (max-width: 600px) {
        .select__main {
          padding: 0 0.4rem;
        }

        .hud__name {
          letter-spacing: 0.4em;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <canvas id="game" aria-hidden="true" style="display: none"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="vignette--die" data-die-vignette aria-hidden="true"></div>
    <div class="toast" data-toast aria-hidden="true"></div>
    <div class="tap-prompt" data-tap-prompt aria-hidden="true">Tap to start</div>

    <svg width="0" height="0" style="position: absolute; pointer-events: none" aria-hidden="true">
      <defs>
        <symbol id="i-chev-left" viewBox="0 0 24 24">
          <path
            d="M15 6 L9 12 L15 18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </symbol>
        <symbol id="i-chev-right" viewBox="0 0 24 24">
          <path
            d="M9 6 L15 12 L9 18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </symbol>
        <symbol id="i-play" viewBox="0 0 24 24">
          <path d="M7 5 L19 12 L7 19 Z" fill="currentColor" />
        </symbol>
        <symbol id="i-pause" viewBox="0 0 24 24">
          <rect x="7" y="5" width="3.4" height="14" rx="1.1" fill="currentColor" />
          <rect x="13.6" y="5" width="3.4" height="14" rx="1.1" fill="currentColor" />
        </symbol>
        <symbol id="i-restart" viewBox="0 0 24 24">
          <path
            d="M20 12 a8 8 0 1 1 -2.34 -5.66"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <polyline
            points="20 4 20 9 15 9"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </symbol>
        <symbol id="i-grid" viewBox="0 0 24 24">
          <rect
            x="4"
            y="4"
            width="7"
            height="7"
            rx="1.2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          />
          <rect
            x="13"
            y="4"
            width="7"
            height="7"
            rx="1.2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          />
          <rect
            x="4"
            y="13"
            width="7"
            height="7"
            rx="1.2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          />
          <rect
            x="13"
            y="13"
            width="7"
            height="7"
            rx="1.2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          />
        </symbol>
        <symbol id="i-home" viewBox="0 0 24 24">
          <path
            d="M3 11 L12 4 L21 11 V20 a1 1 0 0 1 -1 1 H15 V14 H9 V21 H4 a1 1 0 0 1 -1 -1 Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linejoin="round"
            stroke-linecap="round"
          />
        </symbol>
        <symbol id="i-diamond" viewBox="0 0 24 24">
          <path d="M12 3 L21 12 L12 21 L3 12 Z" fill="currentColor" />
        </symbol>
        <symbol id="i-settings" viewBox="0 0 24 24">
          <circle
            cx="12"
            cy="12"
            r="3"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          />
          <path
            d="M12 2 v3 M12 19 v3 M4.2 4.2 l2.1 2.1 M17.7 17.7 l2.1 2.1 M2 12 h3 M19 12 h3 M4.2 19.8 l2.1 -2.1 M17.7 6.3 l2.1 -2.1"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </symbol>
      </defs>
    </svg>

    <main class="stage" aria-live="polite">
      <!-- Boot screen -->
      <section class="screen boot is-active" data-screen="boot" tabindex="0">
        <div class="boot__inner">
          <h1 class="boot__title">Dancing Line</h1>
          <span class="boot__rule" aria-hidden="true"></span>
          <p class="boot__prompt">Tap to start</p>
        </div>
      </section>

      <!-- Level select -->
      <section class="screen select" data-screen="select" aria-label="Level select">
        <header class="select__top">
          <button class="ico" data-back-boot aria-label="Back to title">
            <svg class="icon"><use href="#i-home" /></svg>
          </button>
          <p class="select__heading">Select Level</p>
          <span class="ico ghost" aria-hidden="true">
            <svg class="icon"><use href="#i-settings" /></svg>
          </span>
        </header>

        <div class="select__main">
          <button class="arrow" data-prev aria-label="Previous level">
            <svg class="icon"><use href="#i-chev-left" /></svg>
          </button>
          <div class="select__hero">
            <p class="select__num">
              <span data-num>01</span><i>/</i><span data-total>06</span>
            </p>
            <h2 class="select__name" data-name>The Beginning</h2>
          </div>
          <button class="arrow" data-next aria-label="Next level">
            <svg class="icon"><use href="#i-chev-right" /></svg>
          </button>
        </div>

        <footer class="select__bottom">
          <div class="dots" data-dots></div>
          <button class="play-cta" data-play aria-label="Play level">
            <svg class="icon"><use href="#i-play" /></svg>
          </button>
          <button class="test-btn" data-test-open aria-label="Test custom level">Test</button>
        </footer>
      </section>

      <!-- Test level modal -->
      <div class="test-modal" data-test-modal>

    <script type="module">
      import { DancingLineGame } from "./runtime.js";

      // ─────────────────────────────────────────────────────────────
      // Levels (menu metadata) and runtime data fetch
      // ─────────────────────────────────────────────────────────────

      const LEVELS = [
        {

        },

        {

          line: "#eaf6ff",
          glow: "rgba(160, 212, 245, 0.6)",
          tileTop: "rgba(200, 230, 255, 0.18)",
          tileSide1: "rgba(0, 10, 30, 0.5)",
          tileSide2: "rgba(0, 10, 30, 0.3)",
        },
        {
          id: "chaos",
          name: "The Chaos",
          seed: 89,
          bg: ["#1a0410", "#8d1235", "#ec3f77"],
          line: "#ffeaf2",
          glow: "rgba(255, 130, 180, 0.6)",
          tileTop: "rgba(255, 220, 235, 0.18)",
          tileSide1: "rgba(40, 0, 10, 0.55)",
          tileSide2: "rgba(40, 0, 10, 0.32)",
        },
        {
          id: "storm",
          name: "The Storm",
          seed: 61,
          bg: ["#070918", "#1f2670", "#8674dc"],
          line: "#ecebff",
          glow: "rgba(160, 170, 255, 0.6)",
          tileTop: "rgba(220, 220, 255, 0.16)",
          tileSide1: "rgba(0, 0, 30, 0.55)",
          tileSide2: "rgba(0, 0, 30, 0.32)",
        },
      ];

      const audioAssets = {
        death: "https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/sound-effects/death.wav",
        victory: "https://cdn.jsdelivr.net/gh/jimmyqrg/dancing-line-music@main/sound-effects/victory.wav",
      };
      const sound = (name) => {
        try {
          const a = new Audio(audioAssets[name]);
          a.volume = 0.6;
          return a.play().catch(() => {});
        } catch (_) {
          /* asset not present yet */
        }
      };

      let LEVEL_DATA = { levels: {} };
      const levelFiles = ["beginning", "piano", "ocean", "winter", "desert", "earth", "taurus", "crystal", "chaos", "storm"];
      await Promise.all(levelFiles.map(async (id) => {
        try {
          const res = await fetch(`./levels/${id}.json`, { cache: "no-store" });
          if (res.ok) LEVEL_DATA.levels[id] = await res.json();
        } catch (_) {}
      }));

      // ─────────────────────────────────────────────────────────────
      // Menu canvas (2D ambient)
      // ─────────────────────────────────────────────────────────────

      const canvas = document.getElementById("scene");
      const gameCanvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      let W = window.innerWidth;
      let H = window.innerHeight;
      let dpr = Math.min(window.devicePixelRatio || 1, 2);

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      window.addEventListener("resize", resize);
      resize();

      function isoTile() {
        const base = Math.min(W, H) / 26;
        return Math.max(14, base);
      }

      function iso(x, y, T) {
        return { x: (x - y) * T, y: (x + y) * T * 0.5 };
      }

      function mulberry32(seed) {
        let a = seed >>> 0;
        return () => {
          a = (a + 0x6d2b79f5) >>> 0;
          let t = a;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function makePath(seed, count = 90) {
        const r = mulberry32(seed);
        const pts = [{ x: 0, y: 0 }];
        let dir = 0;
        let x = 0,
          y = 0;
        for (let i = 0; i < count; i++) {
          const len = 2 + Math.floor(r() * 6);
          if (dir === 0) x += len;
          else y += len;
          pts.push({ x, y });
          dir = 1 - dir;
        }
        return pts;
      }

      function pathLength(pts) {
        let s = 0;
        for (let i = 1; i < pts.length; i++) {
          s += Math.abs(pts[i].x - pts[i - 1].x) + Math.abs(pts[i].y - pts[i - 1].y);
        }
        return s;
      }

      function pointAt(pts, t) {
        let acc = 0;
        for (let i = 1; i < pts.length; i++) {
          const dx = pts[i].x - pts[i - 1].x;
          const dy = pts[i].y - pts[i - 1].y;
          const len = Math.abs(dx) + Math.abs(dy);
          if (t <= acc + len) {
            const u = (t - acc) / len;
            return { x: pts[i - 1].x + dx * u, y: pts[i - 1].y + dy * u };
          }
          acc += len;
        }
        return pts[pts.length - 1];
      }

      function tilesAlong(pts) {
        const seen = new Set();
        const arr = [];
        for (let i = 1; i < pts.length; i++) {
          const a = pts[i - 1],
            b = pts[i];
          const sx = Math.sign(b.x - a.x),
            sy = Math.sign(b.y - a.y);
          const len = Math.abs(b.x - a.x) + Math.abs(b.y - a.y);
          for (let k = 0; k <= len; k++) {
            const x = a.x + sx * k;
            const y = a.y + sy * k;
            const key = x + "," + y;
            if (!seen.has(key)) {
              seen.add(key);
              arr.push({ x, y });
            }
          }
        }
        arr.sort((p, q) => p.x + p.y - (q.x + q.y));
        return arr;
      }

      // ─────────────────────────────────────────────────────────────
      // Scene state
      // ─────────────────────────────────────────────────────────────

      const MODES = {
        boot: { focus: 0.55, alpha: 0.55, speed: 1.4 },
        select: { focus: 0.62, alpha: 0.5, speed: 1.2 },
        game: { focus: 1.0, alpha: 1.0, speed: 2.6 },
      };

      const scene = {
        level: LEVELS[0],
        path: [],
        tiles: [],
        total: 0,
        progress: 0,
        camera: { x: 0, y: 0 },
        zoom: 0.6,
        alpha: 0.5,
        speed: 1.2,
        running: true,
        flash: 0,
      };

      function loadLevel(level) {
        scene.level = level;
        scene.path = makePath(level.seed);
        scene.tiles = tilesAlong(scene.path);
        scene.total = pathLength(scene.path);
        scene.progress = 0;
        const start = iso(scene.path[0].x, scene.path[0].y, isoTile());
        scene.camera.x = start.x;
        scene.camera.y = start.y;
        applyTheme(level);
      }

      function applyTheme(level) {
        const root = document.documentElement;
        root.style.setProperty("--bg-far", level.bg[0]);
        root.style.setProperty("--bg-mid", level.bg[1]);
        root.style.setProperty("--bg-near", level.bg[2]);
        root.style.setProperty("--line", level.line);
        root.style.setProperty("--glow", level.glow);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", level.bg[0]);
      }

      function setMode(name) {
        const m = MODES[name] || MODES.boot;
        scene.targetZoom = m.focus;
        scene.targetAlpha = m.alpha;
        scene.speed = m.speed;
      }

      // ─────────────────────────────────────────────────────────────
      // Rendering
      // ─────────────────────────────────────────────────────────────

      function drawTileBlock(c, T, theme) {
        const dz = Math.max(6, T * 0.32);
        ctx.fillStyle = theme.tileSide2;
        ctx.beginPath();
        ctx.moveTo(c.x + T, c.y);
        ctx.lineTo(c.x, c.y + T * 0.5);
        ctx.lineTo(c.x, c.y + T * 0.5 + dz);
        ctx.lineTo(c.x + T, c.y + dz);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = theme.tileSide1;
        ctx.beginPath();
        ctx.moveTo(c.x - T, c.y);
        ctx.lineTo(c.x, c.y + T * 0.5);
        ctx.lineTo(c.x, c.y + T * 0.5 + dz);
        ctx.lineTo(c.x - T, c.y + dz);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = theme.tileTop;
        ctx.beginPath();
        ctx.moveTo(c.x, c.y - T * 0.5);
        ctx.lineTo(c.x + T, c.y);
        ctx.lineTo(c.x, c.y + T * 0.5);
        ctx.lineTo(c.x - T, c.y);
        ctx.closePath();
        ctx.fill();
      }

      function drawTrail(T, theme, headPt) {
        const pts = [scene.path[0]];
        let acc = 0;
        for (let i = 1; i < scene.path.length; i++) {
          const a = scene.path[i - 1],
            b = scene.path[i];
          const len = Math.abs(b.x - a.x) + Math.abs(b.y - a.y);
          if (acc + len <= scene.progress) {
            pts.push(b);
            acc += len;
          } else {
            pts.push(headPt);
            break;
          }
        }

        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.strokeStyle = "rgba(0,0,0,0.32)";
        ctx.lineWidth = Math.max(6, T * 0.42);
        ctx.beginPath();
        for (let i = 0; i < pts.length; i++) {
          const p = iso(pts[i].x, pts[i].y, T);
          if (i === 0) ctx.moveTo(p.x, p.y + T * 0.18);
          else ctx.lineTo(p.x, p.y + T * 0.18);
        }
        ctx.stroke();

        ctx.strokeStyle = theme.line;
        ctx.lineWidth = Math.max(4, T * 0.3);
        ctx.beginPath();
        for (let i = 0; i < pts.length; i++) {
          const p = iso(pts[i].x, pts[i].y, T);
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();

        return iso(headPt.x, headPt.y, T);
      }

      function drawHead(p, T, theme) {
        const r = Math.max(6, T * 0.34);

        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4);
        grd.addColorStop(0, theme.glow);
        grd.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = grd;
        ctx.fillRect(p.x - r * 4, p.y - r * 4, r * 8, r * 8);

        ctx.fillStyle = theme.line;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - r);
        ctx.lineTo(p.x + r, p.y);
        ctx.lineTo(p.x, p.y + r);
        ctx.lineTo(p.x - r, p.y);
        ctx.closePath();
        ctx.fill();
      }

      let last = 0;

      function frame(ts) {
        const dt = last ? Math.min((ts - last) / 1000, 0.066) : 0;
        last = ts;

        if (scene.running) {
          scene.progress += scene.speed * dt;
          if (scene.progress >= scene.total - 1) {
            scene.progress = 0;
            const start = iso(scene.path[0].x, scene.path[0].y, isoTile());
            scene.camera.x = start.x;
            scene.camera.y = start.y;
          }
        }

        scene.zoom += ((scene.targetZoom ?? scene.zoom) - scene.zoom) * Math.min(1, dt * 4);
        scene.alpha += ((scene.targetAlpha ?? scene.alpha) - scene.alpha) * Math.min(1, dt * 4);
        if (scene.flash > 0) scene.flash = Math.max(0, scene.flash - dt * 3);

        const theme = scene.level;
        ctx.clearRect(0, 0, W, H);

        const T = isoTile() * scene.zoom;
        const head = pointAt(scene.path, scene.progress);
        const headIso = iso(head.x, head.y, T);

        scene.camera.x += (headIso.x - scene.camera.x) * Math.min(1, dt * 2.6);
        scene.camera.y += (headIso.y - scene.camera.y) * Math.min(1, dt * 2.6);

        ctx.save();
        ctx.globalAlpha = scene.alpha;
        ctx.translate(W / 2 - scene.camera.x, H * 0.62 - scene.camera.y);

        for (let i = 0; i < scene.tiles.length; i++) {
          const t = scene.tiles[i];
          const c = iso(t.x, t.y, T);
          if (
            c.x < scene.camera.x - W ||
            c.x > scene.camera.x + W ||
            c.y < scene.camera.y - H ||
            c.y > scene.camera.y + H
          ) {
            continue;
          }
          drawTileBlock(c, T, theme);
        }

        const headScreen = drawTrail(T, theme, head);
        drawHead(headScreen, T, theme);

        ctx.restore();

        if (scene.flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${scene.flash * 0.18})`;
          ctx.fillRect(0, 0, W, H);
        }

        requestAnimationFrame(frame);
      }

      // ─────────────────────────────────────────────────────────────
      // UI wiring
      // ─────────────────────────────────────────────────────────────

      const screens = {
        boot: document.querySelector('[data-screen="boot"]'),
        select: document.querySelector('[data-screen="select"]'),
        game: document.querySelector('[data-screen="game"]'),
      };

      let activeScreen = "boot";

      function showScreen(name) {
        activeScreen = name;
        Object.entries(screens).forEach(([k, el]) => {
          el.classList.toggle("is-active", k === name);
        });
        setMode(name);
      }

      // Boot → select
      screens.boot.addEventListener("click", () => {
        showScreen("select");
      });
      screens.boot.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          showScreen("select");
        }
      });

      // Level pager
      const numEl = document.querySelector("[data-num]");
      const totalEl = document.querySelector("[data-total]");
      const nameEl = document.querySelector("[data-name]");
      const dotsEl = document.querySelector("[data-dots]");
      const gameTitleEl = document.querySelector("[data-game-title]");
      const gemsEl = document.querySelector("[data-gems]");
      const progressEl = document.querySelector("[data-progress]");
      const pauseModal = document.querySelector("[data-pause-modal]");

      let currentIdx = 0;
      totalEl.textContent = String(LEVELS.length).padStart(2, "0");

      LEVELS.forEach((_, i) => {
        const d = document.createElement("span");
        d.className = "dot" + (i === 0 ? " is-active" : "");
        d.addEventListener("click", () => goTo(i));
        dotsEl.append(d);
      });

      function goTo(idx, dir = 1) {
        const next = ((idx % LEVELS.length) + LEVELS.length) % LEVELS.length;
        if (next === currentIdx) return;
        currentIdx = next;
        const lvl = LEVELS[currentIdx];

        nameEl.classList.add("is-swap");
        setTimeout(() => {
          nameEl.textContent = lvl.name;
          nameEl.classList.remove("is-swap");
        }, 180);

        numEl.textContent = String(currentIdx + 1).padStart(2, "0");
        dotsEl.querySelectorAll(".dot").forEach((d, i) => {
          d.classList.toggle("is-active", i === currentIdx);
        });
        loadLevel(lvl);
      }

      document.querySelector("[data-prev]").addEventListener("click", () =>
        goTo(currentIdx - 1, -1),
      );
      document.querySelector("[data-next]").addEventListener("click", () =>
        goTo(currentIdx + 1, 1),
      );
      document.querySelector("[data-back-boot]").addEventListener("click", () => {
        showScreen("boot");
      });

      // Keyboard navigation
      window.addEventListener("keydown", (e) => {
        if (activeScreen === "select") {
          if (e.key === "ArrowLeft") goTo(currentIdx - 1, -1);
          else if (e.key === "ArrowRight") goTo(currentIdx + 1, 1);
          else if (e.key === "Enter") startLevel();
          else if (e.key === "Escape") showScreen("boot");
        } else if (activeScreen === "game") {
          if (e.key === "Escape") togglePause();
        }
      });

      // ─────────────────────────────────────────────────────────────
      // 3D engine wiring
      // ─────────────────────────────────────────────────────────────

      const dieModal = document.querySelector("[data-die-modal]");
      const winModal = document.querySelector("[data-win-modal]");
      const dieGemsEl = document.querySelector("[data-die-gems]");
      const winGemsEl = document.querySelector("[data-win-gems]");
      const dieVignette = document.querySelector("[data-die-vignette]");
      const toastEl = document.querySelector("[data-toast]");
      const tapPrompt = document.querySelector("[data-tap-prompt]");

      let game = null;

      function destroyGame() {
        if (game) {
          game.destroy();
          game = null;
        }
        gameCanvas.style.display = "none";
        canvas.style.display = "block";
      }

      function showModal(el, on) {
        if (!el) return;
        el.classList.toggle("is-active", !!on);
      }

      function showToast(text, ms = 1400) {
        if (!toastEl) return;
        toastEl.textContent = text;
        toastEl.classList.add("is-active");
        clearTimeout(toastEl._t);
        toastEl._t = setTimeout(() => toastEl.classList.remove("is-active"), ms);
      }

      function buildLevelData(idx) {
        const meta = LEVELS[idx];
        const data = LEVEL_DATA.levels?.[meta.id];
        if (!data) return null;
        return data;
      }

      function startLevel() {
        const lvl = LEVELS[currentIdx];
        const data = buildLevelData(currentIdx);
        if (!data) {
          showToast("Level not loaded");
          return;
        }
        gameTitleEl.textContent = lvl.name;
        gemsEl.textContent = "0";
        progressEl.style.width = "0%";
        showModal(pauseModal, false);
        showModal(dieModal, false);
        showModal(winModal, false);
        dieVignette.classList.remove("is-active");

        destroyGame();
        canvas.style.display = "none";
        gameCanvas.style.display = "block";

        game = new DancingLineGame({
          canvas: gameCanvas,
          level: data,
          audioPlay: sound,
          onEvent: handleGameEvent,
          musicUrl: data.audio || null,
        });
        showScreen("game");
        tapPrompt.classList.add("is-active");
      }

      function handleGameEvent(ev) {
        switch (ev.type) {
          case "start":
            tapPrompt.classList.remove("is-active");
            break;
          case "gem":
            gemsEl.textContent = String(ev.count);
            break;
          case "progress":
            progressEl.style.width = (ev.value * 100).toFixed(2) + "%";
            break;
          case "death":
            dieGemsEl.textContent = String(ev.gems);
            dieVignette.classList.add("is-active");
            setTimeout(() => showModal(dieModal, true), 700);
            break;
          case "victory":
            winGemsEl.textContent = String(ev.gems);
            setTimeout(() => showModal(winModal, true), 600);
            break;
        }
      }

      function restartCurrent() {
        if (!game) return;
        showModal(pauseModal, false);
        showModal(dieModal, false);
        showModal(winModal, false);
        dieVignette.classList.remove("is-active");
        game.reset();
        gemsEl.textContent = "0";
        progressEl.style.width = "0%";
        tapPrompt.classList.add("is-active");
      }

      function quitToSelect() {
        showModal(pauseModal, false);
        showModal(dieModal, false);
        showModal(winModal, false);
        dieVignette.classList.remove("is-active");
        destroyGame();
        showScreen("select");
      }

      document.querySelector("[data-play]").addEventListener("click", startLevel);

      const pauseBtn = document.querySelector("[data-pause]");
      pauseBtn.addEventListener("click", () => togglePause());
      document.querySelector("[data-resume]").addEventListener("click", () => togglePause(false));
      document.querySelector("[data-restart]").addEventListener("click", restartCurrent);
      document.querySelector("[data-quit]").addEventListener("click", quitToSelect);
      document.querySelector("[data-die-restart]").addEventListener("click", restartCurrent);
      document.querySelector("[data-die-quit]").addEventListener("click", quitToSelect);
      document.querySelector("[data-win-restart]").addEventListener("click", restartCurrent);
      document.querySelector("[data-win-quit]").addEventListener("click", quitToSelect);

      // Test level modal
      const testModal = document.querySelector("[data-test-modal]");
      const testJsonEl = document.querySelector("[data-test-json]");
      document.querySelector("[data-test-open]").addEventListener("click", () => {
        testModal.classList.add("is-active");
      });
      document.querySelector("[data-test-close]").addEventListener("click", () => {
        testModal.classList.remove("is-active");
      });
      document.querySelector("[data-test-play]").addEventListener("click", () => {
        let data;
        try {
          data = JSON.parse(testJsonEl.value);
        } catch (e) {
          alert("Invalid JSON: " + e.message);
          return;
        }
        testModal.classList.remove("is-active");
        gameTitleEl.textContent = data.name || "Test Level";
        gemsEl.textContent = "0";
        progressEl.style.width = "0%";
        showModal(pauseModal, false);
        showModal(dieModal, false);
        showModal(winModal, false);
        dieVignette.classList.remove("is-active");
        destroyGame();
        canvas.style.display = "none";
        gameCanvas.style.display = "block";
        game = new DancingLineGame({
          canvas: gameCanvas,
          level: data,
          audioPlay: sound,
          onEvent: handleGameEvent,
          musicUrl: data.audio || null,
        });
        showScreen("game");
        tapPrompt.classList.add("is-active");
      });

      function togglePause(force) {
        if (!game) return;
        const isOpen = pauseModal.classList.contains("is-active");
        const next = typeof force === "boolean" ? force : !isOpen;
        showModal(pauseModal, next);
        if (next) game.pause();
        else game.resume();
      }

      // Progress bar idle update for menu canvas (kept for compat)
      function tickHud() {
        if (activeScreen === "game" && !game && scene.total > 0) {
          const pct = (scene.progress / scene.total) * 100;
          progressEl.style.width = pct.toFixed(2) + "%";
        }
        requestAnimationFrame(tickHud);
      }
      tickHud();

      // ─────────────────────────────────────────────────────────────
      // Boot
      // ─────────────────────────────────────────────────────────────

      loadLevel(LEVELS[0]);
      setMode("boot");
      scene.zoom = MODES.boot.focus;
      scene.alpha = MODES.boot.alpha;
      requestAnimationFrame(frame);
      screens.boot.focus();

      window.DancingLine = {
        levels: LEVELS,
        levelData: LEVEL_DATA,
        sound,
        getGame: () => game,
      };
    </script>
  </body>
</html>
